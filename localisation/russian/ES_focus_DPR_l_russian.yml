l_russian:
#Ветка на подготовку
 DPR_dark_clouds_over_donbass: "Темные тучи над Донбассом..."
 DPR_dark_clouds_over_donbass_desc: "В 2014 году, с началом предательского Евромайдана, героический народ Донбасса определил свое будущее и встал против киевского режима с оружием в руках. Совместно наши республики отстояли свою независимость и сепарацию от Украины и выразили преданность своей настоящей Родине - России! Во время Русской Весны мы понесли большие жертвы в связи с агрессией бандеровцев, пожелавших уничтожить наш героический народ и отобрать наше право на самоопределение. Сегодня темные тучи вновь встали над нами спустя 8 лет. Мы уверенны, что скоро Украина решит совершить очередной удар, чтобы сломить нашу Новороссию. Чтобы не допустить уничтожения и иметь возможность вернуться в лоно матери России, мы начнем готовиться к отражению военной агрессии и освобождению наших территорий. За Родину! За Донбасс!"
 DPR_preparations_day_and_night: "Подготовка к неизбежному"
 DPR_preparations_day_and_night_desc: "Спустя 8 лет нашей войны за независимость мы поняли, что Украина не оставит попыток захватить Донбасс и навязать людям бандеровскую идеологию. Мы не можем этого допустить! Сегодня над нами нависла угроза нового противостояния, которое будет совершенно не похоже на нашу первую войну. За 8 лет ВСУ укрепились и готовы к противостоянию, но и со стороны России ведутся военные маневры, что, скорее всего, предвещает последний бой. Чтобы обеспечить максимальный успех нашей республики, мы обезопасим нашу промышленность и приведем в состояние максимальной боеготовности Народную милицию. Для освобождения наших территорий мы должны сделать выводы из боев с укронацистами в Иловайске, под Дебальцево и в Донецком аэропорту, а также, возможно, прибегнуть к помощи нашей великой Родины..."
 DPR_war_on_the_horizon: "Война на горизонте"
 DPR_war_on_the_horizon_desc: "Полномасштабная агрессия Украины не за горами, и нам её не избежать. Все эти 8 лет киевский режим готовил армию для того, чтобы вновь попытаться захватить и разорить земли Новороссии. Ранее эскалации удавалось избегать, но мы знаем, что надеяться на благосклонность безумной украинской хунты больше нельзя. По сведениям, добытым нашими разведывательными подразделениями, киевский режим скапливает просто баснословные силы своих боевиков на нашей границе. Чтобы выстоять в предстоящем конфликте, командование Народных милиций подготовит войска и материальную часть для проводения оборонительных и контрнаступательных операций, взяв за основу наш опыт ведения БД в 2014-2015 годах в кооперации с Народной милицией Луганской Народной Республики. Не исключено, что для защиты суверенитета Донецкой Народной Республики мы будем вынуждены ударить первыми..."
 DPR_remind_the_russian_spring: "Уроки «Русской Весны»"
 DPR_remind_the_russian_spring_desc: "В преддверии новой войны, мы должны вспомнить о подвигах наших бравых ополченцев, которые в 2014-2015 годах отважно защищали Донецкую Народную Республику во время Русской Весны. Их мужество и решимость стали ключевым фактором в нашей борьбе за независимость и свободу от киевской хунты. Сегодня, когда враги снова идут на нашу землю, мы должны вспомнить своих героев и быть готовыми быть как они. Они показали нам, что единство и сила духа могут победить любое зло, даже самое страшное. Пусть их подвиги вдохновят нас на новые победы и помогут в борьбе с украинским неофашизмом."
 DPR_find_the_ammunition_for_our_soldiers: "Достать снаряжение для наших парней"
 DPR_find_the_ammunition_for_our_soldiers_desc: "Совсем скоро нашим войскам предстоит вновь сразиться с украинской армией, и для победы над врагом нам необходимо закупить и запросить у России больше пехотного снаряжения, чем вообще когда-либо было. Иначе, если мы не обеспечим наших бойцов всем необходимым для ведения войны, это вряд ли хорошо закончится."
 DPR_mobolize_transport: "Мобилизовать автотранспорт"
 DPR_mobolize_transport_desc: "После начала мобилизации численность Народной милиции гарантированно возрастёт в несколько раз. Однако, мы не имеем того количества колёсное техники, которое необходимо для обеспечения такой крупной группировки войск.  Ввиду этого, дабы снабдить пехотные мобилизованные бригады, жизненно необходимо провести мобилизацию всего имеющегося, даже гражданского автотранспорта. Многие добровольцы благоразумно пожертвовали свой личный транспорт, но этого недостаточно. Все гражданские внедорожники, грузовики с государственных предприятий и корпоративная автотехника должны быть мобилизованы для нужд Народной милиции в столь сложный час для всей Республики."
 DPR_repair_the_remnants_of_tanks: "Отремонтировать остатки техники"
 DPR_repair_the_remnants_of_tanks_desc: "Уже сейчас в распоряжении народных республик имеется множество танков, бронированных боевых машин, артиллерийских орудий, миномётов и даже комплеков РСЗО. Однако у нас остаётся возможность отремонтировать поврежденную ранее технику и дополнительно укомплектовать нашу армию отремонтированными образцами вооружения."
 DPR_general_moblization: "Всеобщая мобилизация"
 DPR_general_moblization_desc: "Ситуация на линии фронта становится все более тяжелой. Противник невероятно силён и ещё более коварен и свиреп, и нам придётся бросить все имеющиеся силы против общего врага, так же как делали наши деды и прадеды во время Великой Отечественной войны. Для защиты наших граждан мы вынуждены принять, возможно, тяжелейшее решение со времён начала нашей борьбы за свободу от нацизма. У нас нет времени для должной подготовки бойцов. Но на нашей стороне будет сама Россия, её могучая армия сделает всё, чтобы освободить наши земли. Так отдадим же всё, что у нас есть, чтобы покончить с чудищем, именуемым \"Украина\".\n\nНаше дело правое, враг будет разбит, победа будет за нами!"
 DPR_prepare_the_mgb: "Подготовить МГБ"
 DPR_prepare_the_mgb_desc: "В условиях военного конфликта Министерство государственной безопасности (МГБ) может играть ключевую роль в обеспечении национальной безопасности, борьбе с террористическими организациями, такими как ГУР и СБУ, контрразведке против них же и противодействии внешним угрозам. Эффективная подготовка сотрудников МГБ в условиях войны требует комплексных мер, таких как улучшение технической базы, совершенствование оперативно-розыскной деятельности, создание специализированных подразделений и проведение контрразведывательных операций."
 DPR_not_fallen_republic: "Непавшая республика"
 DPR_not_fallen_republic_desc: "Донецкая Народная Республика провозгласила свою независимость 12 мая 2014 года в ходе противостояния предателям, обосновавшимся в Киеве. Тогда, 8 лет назад, героический народ Донецкой Народной Республики вступил в неравный бой с превосходящими силами украинских банд, чтобы отстоять свою независимость. Несмотря на тяжелую ситуацию, нам удалось сохранить часть земель под контролем Республики и выиграть ту войну. Всё это время наша жизнь была не сладка. Экономика пришла в упадок, сделав жизнь наших граждан невыносимою вплоть до 2017 года, пока Россия не положила этому конец. ВСУ проводили постоянные обстрелы наших территорий и делали все, чтобы мы пали. Однако нам удалось стабилизировать ситуацию и подняться с колен. К сожалению, свобода не дается раз и навсегда, поэтому вскоре нам предстоит схватка, в которой мы должны будем отстоять наше право на независимость и самоопределение."
 DPR_strenghten_the_roadblocks: "Усилить блокпосты"
 DPR_strenghten_the_roadblocks_desc: "Для охраны дорог, путей снабжения и передвижения войск, нам необходимо ввести в состояние повышенной боевой готовности линии наблюдательных пунктов и блокпостов по всей территории ДНР. Также необходимо усилить обороноспособность тыловых ПВД и ППД во избежание катастрофы в случае провала наших передовых частей и выхода украинских соединений на оперативный простор, включая такие мероприятия как рытьё окопов, строительство баррикад, постановку заграждений и выставление дозоров."
 DPR_evacuate_the_people: "Эвакуировать население"
 DPR_evacuate_the_people_desc: "К настоящему моменту на территории нашего края всё ещё проживает около 2 миллионов человек, из которых большая часть это мирные жители. Для того чтобы при освобождении земель Донбасса наш народ пострадал как можно меньше необходимо эвакуировать мирное население в Россию где их смогут обеспечить всем необходимым. На данный момент сразу несколько российских регионов готовы принять у себя наших соотечественников, и это не может не радовать."
 DPR_fight_the_saboteurs: "Борьба с диверсантами"
 DPR_fight_the_saboteurs_desc: "В ходе проведения так называемой \"АТО\" народ Донбасса понял все об истинных намерениях киевской хунты. Несмотря на это, в нашей республике еще есть люди патриотично настроенные в отношении Украины. Агентура СБУ и ГУР принимает различные формы: от проукраинских ждунов, ожидающих прихода карателей из ВСУ, до обученных украинских диверсантов, проводящих свои террористические операции против народа Донбасса. В ходе нашего будущего противостояния с Украиной они будут намереваться активизировать всю свою пятую колонну в Новороссии. Мы должны поручить МГБ выявить врагов Родины. Они либо покаяться за свои преступления, либо замолкнут навечно!"
 DPR_strenghten_the_patrols: "Усилить патрули"
 DPR_strenghten_the_patrols_desc: "Сегодня война как никогда близко, поэтому с целью обеспечения безопасности на наших территориях на необходимо провести специализированные курсы и тренинги для патрульных с целью увеличения эффективности их работы. Также вести регулярные аудиты и отчёты о работе патрулей для постоянного контроля обстановки в самых опасных районах наблюдения. Не менее важно запросить у РФ современное оборудование и технологии для улучшения мониторинга и оперативности патрулирования."
 DPR_on_high_alert: "Боевая готовность"
 DPR_on_high_alert_desc: "После всеобъемлющей подготовки нашей республики к военному конфликту с Украиной, мы должны привести нашу страну в полную боевую готовность. Нам стоит проинформировать всех людей, от органов управления Донецкой Народной Республики до обычного гражданина, об ухудшении ситуации на границе и приведении нашей страны в состояние боевой готовности для обороны нашего государства. В то же время пора закончить все процедуры приготовления в ДНР, морально подготовить военнослужащих к предстоящему конфликту, напомнить им о долге перед республикой, а самое главное - о цели: воссоединении с Россией!"
 DPR_warriors_from_the_east: "Богатыри с востока"
 DPR_warriors_from_the_east_desc: "Спустя 8 лет испытаний и непримиримой борьбы с киевской хунтой и ее приспешниками на наших землях, а также после государственных и экономических кризисов, мы практически потеряли всякую надежду на справедливый и процветающий мир - Русский Мир. Но сегодня наши братья-воины из России официально встали на нашу защиту и объявили о проведении Специальной военной операции на Украине, которая положит конец геноциду русского народа и восстановит справедливость! Народная Милиция Донецкой Народной Республики, участвуя в освобождении своих братьев и сестёр, находящихся под гнётом киевского режима, полностью поддерживает проведение СВО и будет оказывать всеобъемлющую поддержку российской армии, что ярко ознаменовало объединение народа Донбасса с Россией. Теперь мы намеренны быстро положить конец всем бесчинствам бандеровцев, оккупировавших исконные земли Новороссии, и поставить их перед справедливым судом."
 DPR_cooperate_with_russian_goverment: "Координировать действия с правительством РФ"
 DPR_cooperate_with_russian_goverment_desc: "Для выполнения нашего плана мы должны объединить наши усилия с нашими коллегами из Российской Федерации. Мы обсудим ход боевых действий на территории Луганской области и скоординируем расстановку наших совместных сил на границе с бандеровским режимом, а также организуем совместные контрагентурные операции против украинских диверсантов и пособников хунты."
 DPR_expand_the_FSB_contacts: "Расширить штат кураторов из ФСБ"
 DPR_expand_the_FSB_contacts_desc: "Чтобы помешать СБУ в разведке и сборе информации о действиях наших Народных милиций мы должны увеличить штат советников из российской внутренней разведки. Это поможет увеличить эффективность нейтрализации утечек наших данных и вылавливания шпионов бандеровского режима."
 DPR_coordinate_with_VS_RF: "Скоординироваться с Генеральном штабом ВС РФ"
 DPR_coordinate_with_VS_RF_desc: "Для успешной координации наших объединенных сил, совместно с Генеральным штабом ВС РФ мы будем разрабатывать наступательные, оборонительные, штурмовые и логистические операции ради освобождению как отдельно территории Новороссии, так и земель всей Украины, а также сможем сформулировать чёткие цели и задачи Специальной военной операции и пути их достижения. Мы отправим делегацию нашего высшего офицерского состава в Россию для начала полноценного совместного планирования."
#Ветка на войну
 DPR_kalash_again_in_the_hands: "Опять в руках бойцов «Калаш»..."
 DPR_kalash_again_in_the_hands_desc: "«Мы за Донбасс идём вперёд\nСобрав в кулак свой дух и силу\nДонбасский марш наш полк поёт\nВо славу Матушки России!\n\nОпять в руках бойцов «Калаш»\nВо имя наших павших дедов\nНаш полк идёт в Донбасский марш\nЗа нашу новую победу!»"
 DPR_together_with_russian_soldiers: "Вместе с российскими солдатами!"
 DPR_together_with_russian_soldiers_desc: "Мы вместе с теми, кто сражается за правду. Российские солдаты — это не просто союзники, это братья по оружию, которые встали с нами плечом к плечу. На передовой, в окопах, на блокпостах — мы вместе. Один строй, одна цель, одна победа. Нас не сломить, потому что мы едины!"
 DPR_defence_the_communications: "Защита коммуникаций"
 DPR_defence_the_communications_desc: "Линии снабжения, склады, железные дороги, электростанции — это артерии войны, и враг мечтает их перерезать. Но мы не дадим! Крепкая оборона, жёсткий контроль, чёткая система охраны — никто не подберётся к нашим ресурсам. Всё, что нужно фронту, дойдёт вовремя. Безопасность коммуникаций — это кровь победы, и она будет течь без перебоев!" 
 DPR_Joint_meetings_with_the_General_Staff_of_the_VSRF: "Совместные заседания с генштабом ВС РФ"
 DPR_Joint_meetings_with_the_General_Staff_of_the_VSRF_desc: "Побеждает тот, кто действует слаженно. Наши командиры работают в едином строю с российским Генштабом, принимая решения, от которых зависит исход боя. Опыт, технологии, стратегия — всё на высшем уровне. Это не просто координация, это настоящая боевая синергия, где каждый знает своё место и выполняет свою задачу без права на ошибку!" 
 DPR_Donbass_behind_us: "«Донбасс за нами!»"
 DPR_Donbass_behind_us_desc: "Эта земля слишком много пережила, чтобы снова пасть. Донбасс — это несгибаемый дух, это шахтёрская выдержка, это сила воли, проверенная годами. Люди здесь знают, что значит борьба, и знают, кто с ними в трудный час. Поддержка России и ДНР — это не просто слова, это реальные дела, это помощь, это братство, это уверенность в том, что нас не бросят. Донбасс стоял, Донбасс стоит, Донбасс будет стоять!" 
 DPR_Lessons_from_the_first_months: "Уроки первых месяцев"
 DPR_Lessons_from_the_first_months_desc: "С момента начала Специальной военной операции прошло уже несколько месяцев. Стало ясно, что наши первоначальные планы обречены на провал, а значит нам нужна другая тактика и план для победы. В первые дни ВС РФ смогли продвинуться в глубь Украины, освободив множество городов и сёл, но попытка наступления колоннами грузовиков и бронетехники с треском провалилась. Украинская армия не сдалась, и это стало главным просчётом нашего командования. Уже потом стала ясна новая оборонительная тактика ВСУ. Конкретно она заключась в обороне городов, своеобразных \"городов-крепостей\". Мы можем использовать это в наших целях, окружая силы противника в городах, используя опытные штурмовые отряды и наше подавшляющее превосходство в артиллерии. Стоит понимать, что надеяться на скорое завершение конфликта не стоит — это уже стоило нам слишком большой крови. Эффект неожиданности улетучился, а с его уходом вернулась кошмарная мясорубка, совсем как 8 лет назад. Увы, но нам вновь пора готовиться к долгой, затяжной и кровавой войне."
 DPR_Agree_with_the_Russian_doctrine: "Согласиться с российской доктриной"
 DPR_Agree_with_the_Russian_doctrine_desc: "Наша республика официально интегрируется в новую военную доктрину, предложенную Российской Федерацией. В заявлении будет чётко обозначено: этот документ полностью отвечает нашим стратегическим задачам по освобождению территорий и усиливает наши оборонные возможности в текущей оперативной обстановке. Мы нацелены на то, чтобы совместная работа с российскими войсками позволила нам выйти на единые стандарты ведения боевых действий, управления подразделениями и логистики. Только тесная координация с главным союзником гарантирует нам боевую устойчивость и успешное выполнение поставленных задач." 
 DPR_Expansion_of_the_NM_DPR: "Расширение НМ ДНР"
 DPR_Expansion_of_the_NM_DPR_desc: "Благодаря средствам и оборудованию, которые мы получили в рамках программы обмена опытом и технологиями с Министерством обороны России, мы можем укрепить нашу армию и военную экономику. Российские специалисты также смогли наладить производство техники именно на нашей территории, что уже показывает значительный прогресс." 
 DPR_peoples_front: "«Народ - фронту!»"
 DPR_peoples_front_desc: "Во времена текущей войны, когда каждый шаг к победе требует объединённых усилий, простые жители Донецкой Народной Республики должны встать на помощь нашему фронту. В тылу будут развёрнуты сборы всего необходимого для бойцов на передовой. От самодельных окопных свечей, дающих свет и тепло в суровых условиях окопов, до бочек с водой, защищённых для транспортировки через зоны обстрела, — каждая деталь продумана. Сотни добровольцев собирают и отправляют на фронт продукты, сигареты и медикаменты. Эти посылки с жизненно важной помощью и поддержкой окажут серьёзную моральную поддержку нашим солдатам, находящимся на боевом рубеже." 
 DPR_Learn_from_Russia: "Учиться у России"
 DPR_Learn_from_Russia_desc: "Дабы укрепить нашу военную мощь, Народная милиция ДНР должна перенимать опыт ВС РФ, который был приобретён ими в ходе множества войн. Российские военные специалисты, в том числе инструкторы и офицеры, согласились обучать и проводить тактическую подготовку нашим бойцам. Личный состав будет проходить ускоренные курсы по тактике ведения боя, использованию техники и оснащения, что позволит нам повысить боеспособность. Помимо этого, как ожидается, наши силы станут более организованными и скоординированными." 
 DPR_superiority_of_russian_artillery: "Превосходство российской артиллерии"
 DPR_superiority_of_russian_artillery_desc: "Руководство НМ ДНР отметило, что усиление артиллерийского потенциала россиийской армии существенно изменило соотношение сил на фронте. Однако реальное положение на линии фронта свидетельствует о сохранении высокой плотности артиллерийского огня и частоты использования дронов. Особого внимания заслуживает тактика изоляции и подавления украинских укрепленных позиций, успешно применяемая российскими группировками «Центр» и «Восток». Поддержка артиллерии и дронов позволяет наносить точные удары по позициям ВСУ, что не только увеличивает боеспособность войск против живой силы врага, но и способствует закреплению на новых рубежах линии боевого соприкосновения с меньшими потерями среди штурмовых отрядов." 
 DPR_take_russian_mechanized_batalions_organisation: "Перенять организацию мотострелковых подразделений"
 DPR_take_russian_mechanized_batalions_organisation_desc: "Опыт первых боестолкновений с украинской армией указывает на необходимость принятия решений по унификации организационно-штатной структуры общевойсковых соединений под стандарты ВС РФ. Данное решение направлено на повышение эффективности взаимодействия с союзными силами, обеспечения унификации управления и боевого слаживания подразделений. В свете специфики, связанной с ограниченным количеством техники и опытом боевых действий 2014-2015 годов, переход на российские стандарты укрепит боевые возможности республики, позволит максимально эффективно решать задачи обороны и поддержания порядка на фронте." 
 DPR_expand_the_first_army_corpus: "Расширение 1-го армейского корпуса НМ ДНР"
 DPR_expand_the_first_army_corpus_desc: "Расширение первого армейского корпуса" 
 DPR_expand_the_gumanitarka: "Расширить поток гуманитарной помощи"
 DPR_expand_the_gumanitarka_desc: "С самого начала конфликта на востоке Украины Россия регулярно отправляет гуманитарные колонны жителям ЛДНР с продовольствие, медикаментами, одеждой и прочими бытовыми принадлежностями, без которых жизнь наших людей давно стала бы невыносимой. Однако возросшая интенсивность украинских обстрелов требует значительного расширения поставок, что предполагает привлечение не только волонтерских, но и правительственных российских организаций и усиление контроля за распределением гуманитарной помощи."
 DPR_learn_russian_expirience_of_using_tonks: "Перенять российский опыт использования бронетехники"
 DPR_learn_russian_expirience_of_using_tonks_desc: "Российские офицеры обладают огромным тактическим опытом применения бронетехники на поле боя. Чтобы повысить профессионализм наших героев-ополченцев в использовании танков и БМП против фашиствующих орд ВСУ, мы привлечём российских инструкторов для обучения сержантского и солдатского состава наших механизированных соединений. Обучение будет включать маневренные стратегии и полевые учения с участием бронетанковых подразделений, что повысит их выживаемость и обороноспособность против сил врага." 
 DPR_Russian_organisation_structure: "Российская организационная структура"
 DPR_Russian_organisation_structure_desc: "Логистические структуры Реуспублики должны перенять организационный опыт российских коллег, чтобы выстроить более чёткую и эффективную систему управления. Интегрируя российские наработки в координацию и логистику наших подразделений, мы сможем действовать быстрее и слаженнее — особенно в сложных условиях на передовой. Внедрение современных подходов к работе штабов и укрепление взаимодействия с силовыми структурами, по примеру российского МЧС, позволит нам надёжнее защищать наших людей в тылу и оперативнее решать насущные боевые задачи." 
 DPR_End_the_integration_with_MO_RF: "Завершение интеграции с МО РФ"
 DPR_End_the_integration_with_MO_RF_desc: "Работа по интеграции наших армейских структур с российскими подходит к своему логическому завершению. Оставшиеся юридические формальности и расставление росписей нужными людьми завершат процесс, который, несомненно, многократно повысит эффективность координации между нашими подразделениями. Мы станем ещё на шаг ближе к победе!" 
 DPR_begin_the_integration_of_militia_in_VSRF: "Начать перевод частей в подчинение генштаба ВС РФ"
 DPR_begin_the_integration_of_militia_in_VSRF_desc: "Изначально намеченные сроки проведения СВО внесли свои коррективны в планирование взаимодействия наших и российский подразделений. Увы, текущая ситуация на полях сражений будет только ухудшаться, если подразделения народной милиции и ВС РФ продолжат действовать автономно. Только начав процесс объединения нашего и российского генштаба мы сможем добиться максимального единства действий." 
 DPR_demobolise_the_students: "Демобилизация студентов"
 DPR_demobolise_the_students_desc: "Тяжелейшие первые недели специальной военной операции остались позади. Принятое ранее решение по мобилизации студентов нуждается в скорейшем пересмотре, поскольку потребность в призывниках теперь не стоит так остро. Нужно принять все необходимые меры по демобилизации студентов и их возвращении к мирной жизни, а также позаботиться о надлежащем контроле за исполнением указа." 
 DPR_united_general_staff: "Единое командование"
 DPR_united_general_staff_desc: "Объединение верховного командования Народной милиции ДНР с ВС РФ направлено на укрепление обороноспособности республики и повышение эффективности взаимодействия между подразделениями. Решение основано на необходимости ускорения принятия решений и координации боевых действий в условиях текущих вызовов линии фронта. Единое с российским командование позволит оптимизировать использование ресурсов, повысить оперативность и усилить контроль над выполнением боевых задач." 
 DPR_first_donetzzzzk_army_corps: "1-й Донецкий армейский корпус ВС РФ"
 DPR_first_donetzzzzk_army_corps_desc: "После нашего единения с Россией, подразделения Народных милиция официально вошли в состав Вооружённых сил Российской Федерации. Интеграция 1-го армейского корпуса в единую систему управления и снабжения российской армии позволяет нам действовать на совершенно новом уровне — с прямой поддержкой ВКС РФ, артиллерии и разведданными от наших российских братьев. Мы перенимаем штатную структуру, стандарты боевой подготовки и тылового обеспечения передовых частей российских вооружённых сил, что кратно повышает нашу боеспособность и огневую мощь.\n\nОтныне и навсегда, мы не ополчение, не оборванцы на самообеспечении, но регулярное армейское соединение второй армии мира. Да начнётся финальная битва за Донбасс!" 
 DPR_ads_of_contract_serve_in_the_republic: "Реклама контрактной службы в республике"
 DPR_ads_of_contract_serve_in_the_republic_desc: "Реклама контрактной службы в республике" 
#Освобожденные территории
 DPR_liberated_territory: "Освобожденные территории"
 DPR_liberated_territory_desc: "Земля освобождена, но настоящая победа никогда не заканчивается с боями. Теперь нам пора навести порядок, восстановить закон и справедливость, остроить всё, что было разрушено. Очищение от угроз, разминирование, защита жителей, возвращение мира — каждая улица, каждый дом должны быть отстроены и выглядеть лучше, чем выглядели когда либо при киевском режиме. Здесь снова будет жизнь, и теперь никто не сможет отнять её у нас."
 DPR_show_them_russian_world: "Пропагандировать идеи «Русского мира»"
 DPR_show_them_russian_world_desc: "Донбасс — это не обычный регион. Донбасс всегда был символом стойкости и тяжёлого труда русского народа. Здесь всегда жили сильные люди, готовые отстаивать своё. Это земля шахтёров, металлургов, воинов — людей, которые строили, создавали, защищали. Донбасс — это часть великой России, и никакие фальшивые идеи не смогут изменить этого факта. Мы говорим правду, мы показываем, что Русский мир — это сила, справедливость, традиции и единство!"
 DPR_help_with_restoration: "Помощь в восстановлении"
 DPR_help_with_restoration_desc: "Враг оставил руины, но он не смог уничтожить силу нашего духа. Мы больше не будем ждать — мы будем строить и восстанавливать! Добровольцы, инженеры, строители — все, кто готов вложить силы, уже работают на благо освобождённых территорий. Крыши над головами, дороги, школы, больницы — шаг за шагом, кирпич за кирпичом, мы вернём нормальную жизнь в свою родную республику."
 DPR_start_the_filter_process: "Начать фильтрационные процессы"
 DPR_start_the_filter_process_desc: "Мы слишком хорошо знаем, что бывает, когда семена нацизма проростают в умах людей, и мы не допустим, чтобы они когда либо проросли вновь. Мы знаем, кем мы являемся, знаем свою историю, знаем, за что боремся. Нам не нужны чужие грязные, корыстные идеи и мысли — нам нужна правда о нашей земле, о нашем народе, о нашем будущем. На Донбассе нет места чуждым идеям, попыткам навязать ложные ценности или посеять раздор. Только сильный, единый российский Донбасс станет примером для всех!"
 DPR_fix_the_logistics: "Наладить логистику"
 DPR_fix_the_logistics_desc: "Освобождённые земли вновь должны дышать, работать, двигаться. Грузы, продовольствие, техника, топливо, боеприпасы — всё это должно приходить вовремя. Новые маршруты снабжения, охрана путей, жёсткий контроль — это возвращение гражданской экономики и безопасный тыл для наших храбрых солдат. Сильная логистика — сильный Донбасс!"
 DPR_recover_the_infrastructure: "Восстановление гражданской инфраструктуры"
 DPR_recover_the_infrastructure_desc: "Мы проводим планомерное восстановление гражданской инфраструктуры на освобождённых территориях. Первоочередное внимание уделяется жилому фонду, системам энерго- и водоснабжения, а также дорожному сообщению между населёнными пунктами. Разрушенные мосты, повреждённые линии электропередач и выведенные из строя социальные объекты — всё это противник оставил нам в наследство, стремясь парализовать мирную жизнь. В отличие от него, мы возвращаем людям возможность жить и работать в нормальных условиях. Наша задача — обеспечить устойчивое функционирование всех систем жизнеобеспечения и подготовить инфраструктуру к дальнейшему развитию региона."
 DPR_continue_fight_with_saboteurs: "Расширить борьбу с диверсантами"
 DPR_continue_fight_with_saboteurs_desc: "Командованием Народной милиции ДНР совместно с органами государственной безопасности проводится комплекс дополнительных мер по выявлению и нейтрализации диверсионно-разведывательных групп, агентуры и пособников киевского режима. Буде усилен режим контроля на блокпостах и в прифронтовой полосе, отрабатываются сигналы местного населения о подозрительной активности. Мы наращиваем фильтрационные мероприятия и агентурную работу, чтобы пресекать любые попытки дестабилизации обстановки в тылу. Безопасность наших городов и сёл — безусловный приоритет."
 DPR_judge_the_Kiev_butchers: "Уголовные дела против киевских карателей"
 DPR_judge_the_Kiev_butchers_desc: "Следственными органами Донецкой Народной Республики введена планомерная работа по установлению и привлечению к уголовной ответственности пленных военнослужащих ВСУ и националистических формирований, причастных к обстрелам жилых кварталов, убийствам мирных жителей и иным преступлениям против гражданского населения. В отношении установленных лиц, независимо от их нынешнего местонахождения, возбуждаются уголовные дела по статьям, предусматривающим наказание за геноцид и применение запрещённых методов ведения войны. Мы фиксируем каждый эпизод, собираем доказательную базу и будем добиваться экстрадиции обвиняемых. Возмездие за сожжённые дома, разрушенные города и искалеченные судьбы жителей Донбасса не имеет и не будет иметь срока давности."
#Восстановление донецка
 DPR_we_must_be_in_safe: "Мы должны быть в безопасности!"
 DPR_we_must_be_in_safe_desc: "Энергетическая независимость – это не просто комфорт, а вопрос выживания. Мы строим щит, который защитит наш дом, наш город, нашу землю. Мы знаем цену теплу в зимние ночи и свету в темные времена. Безопасность – в наших руках, и никто не заставит нас жить во тьме!"
 DPR_civilian_defense: "Гражданская оборона"
 DPR_civilian_defense_desc: "Когда каждый знает своё дело, город становится крепостью. Резервные источники, защищённые сети, автономные системы – всё это щит, который не даст врагу оставить нас без света и тепла. Гражданская оборона – это сила, рожденная в единстве. Мы не просто выстоим – мы будем сильнее, чем прежде!"
 DPR_Russian_Iron_Dome: "Железный купол по-русски"
 DPR_Russian_Iron_Dome_desc: "Мы не ждём защиты извне – мы строим свою. Наш \"Железный купол\" – это инженерный гений, мощь технологий и воля людей. Ни одна угроза не оставит нас в темноте, потому что у нас есть своя броня. Там, где сила духа соединяется с мощью науки, рождается настоящая неприступность"
 DPR_steel_nights_of_Donetsk: "Железные ночи Донецка"
 DPR_steel_nights_of_Donetsk_desc: "Тьма – это не слабость, это испытание. Когда гаснут фонари, зажигается дух. Железные ночи Донецка – это время стойкости и несгибаемой воли. Мы пережили многое, и никакая тьма не сделает нас слабее. Донецк – город света в сердцах его жителей, и никакие удары не изменят этого."
 DPR_water_supply: "Обеспечить поставки воды"
 DPR_water_supply_desc: "Вода – это жизнь, и враг не отнимет у нас право на неё. Ни одна блокада, ни одна атака не оставит нас без живительной влаги. Мы строим новые маршруты, восстанавливаем сети, укрепляем источники. Каждый глоток воды – это глоток свободы, и мы не позволим никому перекрыть этот поток!"
 DPR_supplies_from_russia: "Поставки из России"
 DPR_supplies_from_russia_desc: "Россия – это сила, Россия – это поддержка, Россия – это надёжность. Когда враг пытается оставить нас без воды, наши братья подставляют плечо. Новые трубопроводы, цистерны, инженерные решения – водная артерия, идущая из России, не остановится. Мы знаем, кто с нами в трудную минуту, и эта помощь делает нас только крепче!"
 DPR_donetsk_water_system: "Подключить Донецк к водопроводу"
 DPR_donetsk_water_system_desc: "Донецк не должен зависеть от прихотей врага. Город-герой заслуживает стабильности и уверенности в завтрашнем дне. Новый водопровод – это не просто трубы, это символ несгибаемости, проект будущего, где никто и никогда не оставит нас без воды. Мы подключим Донецк к мощным источникам, и каждый житель почувствует: мы не просто держимся – мы побеждаем!"
 DPR_Organize_work_to_repair_energy_infrastructure: "Восстановление энергетической инфраструктуры"
 DPR_Organize_work_to_repair_energy_infrastructure_desc: "Каждый провод, каждая подстанция, каждый генератор – это шаг к светлому будущему. Враг разрушает, но мы строим. Мы поднимем упавшие линии, восстановим вышки, запустим турбины. Темнота – это временно, а сила нашего духа и труда – навсегда. Мы знаем, что значит остаться без света, и именно поэтому сделаем так, чтобы больше никто этого не почувствовал!"
 DPR_volounteers_from_russia: "Привлечь волонтеров из России"
 DPR_volounteers_from_russia_desc: "Россия – это не просто страна, это братская сила, которая всегда рядом. Когда нужна помощь – она приходит. Волонтёры, инженеры, строители, специалисты – это люди, которые не спрашивают, почему, а просто берут и делают. Вместе мы быстрее восстановим то, что враг пытался уничтожить. Вместе мы построим систему, которую уже ничто не сломит!"
 DPR_bring_in_Russian_fuel: "Завезти российское топливо"
 DPR_bring_in_Russian_fuel_desc: "Без топлива не будет движения, а без движения нет победы. Российское топливо – это энергия, тепло, мощь заводов, транспорт, генераторы. Пока у нас есть топливо – у нас есть жизнь, и никакая блокада этому не помеха. Завозы идут, системы налажены, резервы пополняются. Это не просто горючее – это кровь экономики, и мы будем сильнее с каждым литром!"
 DPR_stop_civilian_deaths: "Пресечь гибель мирного населения"
 DPR_stop_civilian_deaths_desc: "Мирные жители – это святое, это сердце наших городов, наших улиц, наших семей. Враг хочет посеять страх, но мы не позволим! Защита, эвакуация, укреплённые укрытия – мы делаем всё, чтобы люди были в безопасности. Каждый спасённый человек – это победа, и никто не сможет сломить наш народ, пока мы стоим стеной за друг друга."
 DPR_hum_aid_from_russia: "Раздача гуманитарной помощи из России"
 DPR_hum_aid_from_russia_desc: "Когда в тяжёлые времена протягивают руку помощи – это настоящая поддержка, это братство, это сила единства. Россия не просто отправляет гуманитарные грузы – она делится теплом, заботой, верой в нашу победу. Продукты, лекарства, одежда – всё, что нужно для жизни, идёт к тем, кто в этом нуждается. Мы выстоим, потому что мы вместе, а вместе – мы непобедимы!"
 DPR_narodnaya_druzhina: "Формирование народной дружины"
 DPR_narodnaya_druzhina_desc: "Когда враг пытается внести хаос, народ встаёт на защиту порядка. Народная дружина – это не просто патрули, это сила единства, готовность каждого стать частью защиты своего дома. Безопасность – это дело каждого, и мы не оставим улицы без присмотра. Наши дворы, наши семьи, наш порядок – в надёжных руках."
 DPR_people_who_deserve_to_live: "Народ, заслуживший жить!"
 DPR_people_who_deserve_to_live_desc: "Этот народ прошёл сквозь огонь и тьму. Его пытались сломить, оставить без света, воды, тепла, без будущего. Но он выстоял. Каждый шаг, каждое усилие – ради того, чтобы здесь была жизнь, настоящая, свободная, сильная! Мы заслуживаем жить, строить, любить, растить детей, смотреть в завтрашний день с уверенностью. Наша земля, наша судьба, наша победа – и никто её у нас не отнимет!"
#Модернизация Народной милиции
 DPR_modernization_of_PM: "Модернизация Народной Милиции"
 DPR_modernization_of_PM_desc: "С самого начала конфликта на Юго-Востоке народное ополчение Донбасса впитывало в себя боевой опыт войн нового образца. Пройдя перерождение из разрозненных отрядов ополчения в единый кулак Народной Милиции, в 2014–2015 годах корпуса строились исходя из опыта боёв тех лет. В частном порядке подразделения модернизировались силами бойцов и командиров, попутно впитывая уроки «тлеющего конфликта». В эти дни, после первых залпов новой войны, первой крови и существенного увеличения численности, Народная Милиция вновь должна пройти процесс модернизации и стать полноценной армией освободителей Донбасса."
 DPR_activ_use_drons: "Активное использование дронов"
 DPR_activ_use_drons_desc: "Первые дроны появились в подразделениях НМ ДНР уже довольно давно, однако исключительно по личной инициативе и на свои кровно заработанные. По аналогии и первые условно боевые дроны были применены именно против НМ ДНР на позициях под Донецким аэропортом и Авдеевской промзоной. На сегодняшний же день уже сложно даже вообразить современную войну без разведывательных и ударных БПЛА. Сейчас первостепенной задачей является массовое обучение личного состава искусству управления БПЛА, частные закупки и запросы дронов в РФ, также начаты поиски умельцев в области ремонта и создания собственных моделей."
 DPR_war_has_changed: "Война изменилась..."
 DPR_war_has_changed_desc: "Проведя анализ последних боёв и обозначив аналогии с тем, что было многие годы назад, многие аналитики приходят к выводу: война отличается не только от всего того, что было в 2014–2015 годах, но и даже от того, что происходило месяц назад. И через месяц мы уверенно придём к такому же выводу. Необходимо неустанно вести анализ происходящего на поле боя и адаптироваться под новые условия войны."
 DPR_form_new_image_of_militia: "Сформировать новый образ ополчения"
 DPR_form_new_image_of_militia_desc: "Отныне 1-й АК — это полноценная армия, которая сражается совместно с ВС РФ не только на территории ДНР, но и на всей территории Новороссии, с полной готовностью выдвинуться на любое направление по приказу Верховного главнокомандующего. Образ этой мощи необходимо закрепить в умах всех бойцов армейского корпуса, жителей Донбасса и России. Медийная кампания должна развить данный успех и привлечь новых бойцов."
 DPR_our_defenders: "«Наши защитники..."
 DPR_our_defenders_desc: "В составе сотен полков 1-го АК сейчас служит практически всё мужское население ДНР — от 18 до 55 лет все мужчины были призваны на защиту Донбасса. На плечи многих из них выпали чудовищные испытания первых месяцев боёв, но это ещё не конец. Шахтёры, офисные работники, водители, студенты и их учителя отныне защищают республику на протянувшейся на сотни километров линии фронта. МЧС ликвидирует последствия обстрелов, врачи помогают сотням жертв ужасной войны, а МВД и МГБ не позволяют никому сеять хаос и раздор в тылу. Все они — наши защитники, защитники Донбасса, защитники России..."
 DPR_must_know_how_to_fight: "...должны уметь воевать»"
 DPR_must_know_how_to_fight_desc: "...И все они каждый день сталкиваются с новыми испытаниями в условиях меняющейся войны XXI века. Необходимо собрать опыт и знания со всех участков фронта, получить информацию от всех российских специалистов в смежных областях, чтобы выстоять в этой борьбе с минимальными потерями и иметь шанс восстановиться самим и восстановить свой родной Донбасс после победы." 
 DPR_bring_back_army_discipline: "Вернуть армейскую дисциплину"
 DPR_bring_back_army_discipline_desc: "Неоднородность состава 1-го армейского корпуса всегда была его отличительной особенностью: далеко не все подразделения имели и имеют такую дисциплину, как батальоны «Спарта», «Сомали», «Хан». И если в период затишья с этим ещё можно было мириться, то сейчас это недопустимо. На войне вольность и невнимательность могут привести к смерти не только виновного, но и всего его подразделения. Отныне дисциплина будет неотъемлемой частью всех подразделений ДНР. Проверками займутся военные полицейские РФ и Военная комендатура Донецка."
 DPR_tech_support_from_russia: "Запросить помощь в ремонте техники"
 DPR_tech_support_from_russia_desc: "Сейчас, когда мы сражаемся бок о бок с ВС РФ, появилась возможность прямого взаимодействия с ремонтными бригадами и ремонтными заводами на большой земле. Ввиду интенсивных боёв необходимо не только держать имеющийся танковый парк в полной боевой готовности, но и не пренебрегать восстановлением техники, оставленной на полях сражений."
 DPR_russian_surplus: "Запросить излишки техники"
 DPR_russian_surplus_desc: "Ввиду принятой программы модернизации 1-го армейского корпуса, необходимости его полной моторизации и дополнительной механизации мы направляем в РФ запрос о поставках захваченной техники и машин вроде Т-64, БТР-70, МТ-ЛБ, стоящих на складах консервации. В документе также фигурируют и другие позиции техники, которая есть в запасах ВС РФ, и не используется российской армией. Народной милиции она пригодится."
 DPR_arms_supplies_from_Russia: "Поставки российского вооружения"
 DPR_arms_supplies_from_Russia_desc: "Двигаясь по фронтовым дорогам ДНР, всегда можно увидеть сотни и тысячи использованных тубусов из-под одноразовых гранатомётов и штурмовых реактивных гранат, отработавших ПТРК, десятки тысяч колец-предохранителей и миллионы гильз. Десятки документов о перегреве и расходе ресурса стволов у пулемётов. Очередной запрос, ушедший в РФ, направлен именно на данные виды снаряжения с целью сохранения боеспособности подразделений."
 DPR_Russian_standarts: "Снаряжение по стандартам РФ"
 DPR_Russian_standarts_desc: "Горка и АКС, папаха, наган да шашка — лихой образ ополчения былых лет. Тактический шлем, богатый обвес — отличительная черта элитных батальонов ДНР, чьё ремесло от и до — война, и ни они, ни руководство республики не жалели денег на такое оснащение. И наконец — бойцы с винтовками системы Мосина на блокпостах, свидетельство невозможности быстрого оснащения при увеличении численности армии в несколько раз. Пришло время отойти от частных инициатив и оснастить 1-й армейский корпус товарным количеством снаряжения, соответствующего условиям этой войны. Поставки из РФ будут усилены нашими собственными пошивочными цехами и мастерскими, также будут предприняты меры по привлечению российских магазинов армейского оснащения."
 DPR_Modernisation_t64_and_t72: "Модернизация имеющихся Т-64 и Т-72"
 DPR_Modernisation_t64_and_t72_desc: "Танки — железный кулак любой армии мира, и 1-й армейский корпус НМ ДНР не является исключением. Основой танкового парка республики являются машины, доставшиеся в результате боёв 2014–2015 годов, т.е. танки Т-64 и Т-72, а также их модификации А и Б. Редкие захваченные танки, по типу Т-64БВ, рассматриваются скорее как исключение, нежели как данность. И хотя количество танков удовлетворяет потребности армии республики в данный момент, увеличение процента модернизированных машин повысит эффективность бронетанковых батальонов в несколько раз."
 DPR_Party_of_rszo: "Партия «Чебурашек» и «Снежинок» фронту!"
 DPR_Party_of_rszo_desc: "Одной из забот первого главы ДНР А. Захарченко было создание ВПК ДНР буквально из ничего. В результате реализации данной программы в 2018 году были представлены образцы крайне кустарного вооружения, среди которых были и РСЗО. История данных машин не прервалась вместе с жизнью главы, и их разработка продолжилась. В данный момент несколько машин уже находятся в войсках, но большая часть — на финальной стадии производства. Эту партию необходимо как можно раньше довести до ума и направить на фронт."
 DPR_your_liberators_Donbass: "«Твоим освободителям, Донбасс!»"
 DPR_your_liberators_Donbass_desc: "Не прошло и века с прошлой войны, как вновь чёрные тучи днём и ночью сковывают шахтёрский край. Над терриконами вместо дыма шахтных работ сияют боевые знамёна, а в городах привычные громкие гудки заводов заглушены гулом танковых двигателей. С 2014 года десятки тысяч ополченцев, российских добровольцев, а теперь и кадровых российских военных прошли через сражение, которое на века запомнится как «Битва за Донбасс». На территории ДНР отныне усилены программы помощи всем участникам СВО, военным врачам, волонтёрам и всем тем, кто внёс свой вклад в общее дело."
#Экономическая ветка
DPR_revival_of_republic_economy: "Оживление экономики республики"
DPR_revival_of_republic_economy_desc: "После тяжёлых лет кризиса и нестабильности настало время для решительных действий. Мы должны внедрить экономические реформы, поддержать местные предприятия и привлечь инвестиции, чтобы восстановить промышленность и сельское хозяйство. Улучшение финансовой системы и повышение уровня жизни граждан — ключ к возрождению республики!"
DPR_question_industry: "Вопрос промышленности"
DPR_question_industry_desc: "Развитие промышленности — один из важнейших шагов на пути к укреплению экономики республики. Нам необходимо определить ключевые сектора, которые требуют модернизации и инвестиций. Восстановление заводов и фабрик, увеличение объёмов производства и создание новых рабочих мест помогут обеспечить население стабильным доходом, а государство — необходимыми ресурсами."
DPR_optimisation_work_DMZ: "Оптимизировать работу ДМЗ"
DPR_optimisation_work_DMZ_desc: "Донецкий металлургический завод (ДМЗ) — одно из важнейших предприятий региона, но его работа была нарушена из-за боевых действий и экономической нестабильности. Мы должны провести оптимизацию производства, восстановить поставки сырья и наладить логистику, чтобы этот промышленный гигант вновь начал приносить прибыль и обеспечивать республику высококачественной сталью."
DPR_modernisation_chem_company: "Модернизация химических предприятий"
DPR_modernisation_chem_company_desc: "Многие химические предприятия области, такие как концерн «Стирол», Авдеевский коксохимический завод, Маркохим и Донецкий казенный завод химических изделий пострадали от разрушений или столкнулись с нехваткой оборудования и кадров. Однако есть предприятия, которые, несмотря на трудности, сумели выжить. Их модернизация и переоснащение, а также постепенное восстановление разрушенных заводов позволят значительно увеличить объёмы производства, повысить качество химической продукции и создать новые рабочие места, способствуя восстановлению важного экономического сектора."
DPR_investment_to_repair_workshops: "Инвестиции в ремонтные мастерские"
DPR_investment_to_repair_workshops_desc: "Наличие работоспособной ремонтной базы играет критически важную роль как для гражданского сектора, так и для военной промышленности. Мы должны инвестировать в ремонтные мастерские, чтобы обеспечить восстановление техники, оборудования и инфраструктуры, а также создать условия для производства запасных частей, которые помогут избежать зависимости от внешних поставок."
DPR_realese_components: "Наладить выпуск военных комплектующих"
DPR_realese_components_desc: "Специальная военная операция требует усиленного внимания к вопросам м обороноспособности. Запуск собственного производства военных комплектующих обеспечит народную милицию необходимым снаряжением, вооружением и техникой, что повысит готовность республики к любым вызовам."
DPR_importation_rus_equipment: "Завоз российского оборудования"
DPR_importation_rus_equipment_desc: "Наши предприятия нуждаются в современном оборудовании для полноценного функционирования и выхода на новые мощности. Мы должны обратиться к российским партнёрам за поставками станков, машин и комплектующих, что позволит ускорить восстановление промышленности и модернизировать устаревшие производства."
DPR_master_rus_investment: "Запросить российские инвестиции"
DPR_master_rus_investment_desc: "Для стабильного развития экономики республики требуются значительные финансовые вливания. Нам необходимо привлечь российских инвесторов, готовых вложиться в местную промышленность, инфраструктуру и торговлю. Их поддержка не только обеспечит нас капиталом для восстановления промышленности, дооснащения армии и социальной поддержки населения, но и поможет наладить прочные экономические связи с Россией."
DPR_question_energy: "Вопрос энергетики"
DPR_question_energy_desc: "Без устойчивого энергоснабжения наша экономика окажется в тяжёлом положении. Проблемы с поставками топлива, разрушенная инфраструктура и устаревшее оборудование требуют немедленного вмешательства. Мы должны разработать комплексную программу восстановления энергетического сектора, обеспечив стабильную работу электростанций, модернизацию сетей и привлечение новых источников энергии."
DPR_investment_in_TPP: "Инвестиции в Зуевскую и Старобешевскую ТЭС"
DPR_investment_in_TPP_desc: "Старобешевская и Зуевская ТЭС долгое время были ключевым источником электроэнергии для региона, но в результате кризиса их мощность значительно снизилась. Нам предстоит вложить ресурсы в их восстановление, модернизировать оборудование и найти надёжных поставщиков топлива. Это обеспечит нашу экономику необходимыми энергоресурсами и предотвратит перебои в энергоснабжении."
DPR_creation_reserve_cap: "Создание резервных мощностей"
DPR_creation_reserve_cap_desc: "В условиях нестабильности крайне важно иметь запасные источники энергии. Мы должны развивать альтернативные способы генерации электроэнергии, строить резервные мощности и создавать хранилища топлива, чтобы быть готовыми к возможным кризисам и отключениям."
DPR_rus_support_in_recovery: "Помощь России в восстановлении электросети"
DPR_rus_support_in_recovery_desc: "Россия обладает огромными энергетическими ресурсами и технологиями, которые могут помочь нам в восстановлении электросетей и модернизации энергетической инфраструктуры. Получение поддержки от российских энергетических компаний позволит нам быстрее решить проблему нехватки электричества и улучшить качество энергоснабжения."
DPR_fuel_issue: "Топливный вопрос"
DPR_fuel_issue_desc: "Без топлива невозможно поддерживать ни промышленность, ни гражданскую логистику, ни армию. Нам нужно решить проблему поставок газа и нефтепродуктов, чтобы обеспечить стабильное функционирование республики."
DPR_end_fuel_collapse: "Покончить с топливным коллапсом"
DPR_end_fuel_collapse_desc: ""
DPR_electronic_is_gold: "«Уголь — золото Донбасса!»"
DPR_electronic_is_gold_desc: "Донбасс богат угольными месторождениями, и это наше главное преимущество. Нам необходимо увеличить добычу угля, наладить экспорт и привлечь инвестиции в угольную промышленность, чтобы превратить этот ресурс в основу нашей экономики."
DPR_investment_in_gp_rtk: "Инвестиции в ГП РТК"
DPR_investment_in_gp_rtk_desc: "Государственное предприятие\"Республиканская топливная компания\" играет ключевую роль в обеспечении региона топливом. Развитие этой структуры позволит нам укрепить позиции на топливном рынке, увеличить доходы бюджета и улучшить энергоснабжение."
DPR_contacts_with_gazprom: "Контакты с Газпромом"
DPR_contacts_with_gazprom_desc: "Для долгосрочного энергоснабжения республики нам необходимо наладить прочные связи с \"Газпромом\", который может обеспечить нас стабильными поставками природного газа на выгодных условиях."
DPR_financial_question: "Финансовый вопрос"
DPR_financial_question_desc: "Денежная система республики требует укрепления. Нам нужно наладить финансовый сектор, стабилизировать курс рубля и обеспечить надёжность банковской системы."
DPR_org_work_crb_in_war_time: "Организовать работу ЦРБ в военное время"
DPR_org_work_crb_in_war_time_desc: "Центральный республиканский банк должен работать даже в условиях войны. Мы разработаем меры по обеспечению его бесперебойного функционирования, чтобы население и предприятия могли пользоваться финансовыми услугами."
DPR_keeping_cb_afloat: "Поддержание ЦРБ на плаву"
DPR_keeping_cb_afloat_desc: "Для укрепления нашей банковской системы необходимо провести реформу, которая сделает Центральный республиканский банк главной финансовой структурой республики, контролирующей денежные потоки и обеспечивающей стабильность."
DPR_Facilitate_entry_rus_banks: "Способствовать заходу российских банков в республику"
DPR_Facilitate_entry_rus_banks_desc: "Привлечение российских банков позволит создать стабильную финансовую систему, улучшить доступ к кредитам и упростить расчёты с партнёрами."
DPR_integration_with_rus_economy: "Интеграция с российской экономикой"
DPR_integration_with_rus_economy_desc: "Последний шаг на пути к экономической стабильности — полноценное вхождение в экономическое пространство России. Это обеспечит республике надёжную поддержку, доступ к рынкам и долгосрочное развитие."
#Полит ветка
DPR_republic_of_Pushylin: "Республика Пушилина"
DPR_republic_of_Pushylin_desc: "Донецкая Народная Республика - находится под управлением главы Донецкой Народной Республики и совета правительства республики. Заняв пост главы ДНР после смерти Александра Захарченко, Денис Пушилин выиграл аппаратную борьбу благодаря интригам и поддержке России. Официально утвердившись в должности по результатам выборов, Пушилин приступил к наведению порядка во внутренних делах республики, полностью сохраняя лояльность Москве. При нём непризнанная республика сохранила в полную экономическую и политическую зависимости от России, фактически оставаясь на её содержании.  В то же время в республике был открыт доступ частным инвестициям из России, что существенно облегчило быт жителей ДНР."
DPR_RMKPVG: "Реформировать Межведомственную комиссию по вопросам градостроительства"
DPR_RMKPVG_desc: "Освобождение Донбасса от украинских сил проходит тяжело и сопровождается значительными разрушениями на территории республики. Наши города ещё не успели оправиться от ран постоянных обстрелов, которые продолжались многие годы. Необходимо устранить бюрократические барьеры для оперативного решения вопросов по восстановлению критической инфраструктуры и восстановления экономики."
DPR_support_local_elites: "Поддержать местную элиту"
DPR_support_local_elites_desc: "Несмотря на тяжёлую экономическую обстановку в Республике, за восемь лет здесь успели сформироваться свои влиятельные бизнесмены и аффилированные с ними чиновники, обладающие значительным весом в ДНР. В условиях сложной военной ситуации крайне важно обеспечить их лояльность."
DPR_start_attracting_migrant_workers: "Начать привлечение трудовых мигрантов"
DPR_start_attracting_migrant_workers_desc: "Постоянные обстрелы, безработица, низкие зарплаты, отток трудоспособного населения и всеобщая мобилизация значительно обескровили нашу Республику. Для покрытия потребности в низкоквалифицированной рабочей силе придётся привлекать мигрантов, несмотря на возможные риски роста этнической преступности, которые они могут принести с собой."
DPR_Vitaliy_Hocenkos_government: "Созвать правительство Виталия Хоценко"
DPR_Vitaliy_Hocenkos_government_desc: "Действительный государственный советник РФ III класса Виталий Хоценко был направлен Россией для ускорения интеграции нашей республики как до, так и после долгожданного референдума об объединении. Обновлённое правительство будет дополнительно усилено чиновниками из РФ. Главные задачи правительства — проведение референдума, восстановление разрушенной инфраструктуры и обеспечение стабильного тыла для нашей группировки войск."
DPR_unity_in_the_peoples_council: "Единство в Народном Совете"
DPR_unity_in_the_peoples_council_desc: "После выборов 2018 года голоса распределились между двумя блоками: Общественное движение «Донецкая Республика» — 72,38 %, Общественное движение «Свободный Донбасс» — 26,02 %. Все депутаты едины в видении будущего Республики: объединение с Россией и возвращение оккупированных территорий Донбасса. Необходимо не допустить, чтобы аппаратные интриги раскололи наше единство и продемонстрировали политическую несостоятельность перед Россией."
DPR_suppression_of_militarized_opposition: "Подавление милитаризированной оппозиции"
DPR_suppression_of_militarized_opposition_desc: "Все эти Стрелковы и Губаревы — вечно недовольные, склонные к войне и революциям, постоянно требуют странного. Несмотря на их отсутствие в Республике, они все еще пользуются определённым уважением в некоторых кругах, включая командиров и бойцов. Сняв одних и достигнув договорённостей с другими, мы обезопасим себя от неприятных сюрпризов, на которые способны подобные деятели."
DPR_elections_2023: "Всеобщие выборы главы Донецкой Народной Республики - 2023"
DPR_elections_2023_desc: "Впервые в истории выборы в Народный совет ДНР проводились не среди объединений Донбасса, а среди российских политических партий. Результаты следующие: «Единая Россия» — 78,03%, КПРФ — 6,43%, ЛДПР — 6,25%, «Справедливая Россия» — 3,27%, «Новые Люди» — 1,27%.\n\nТакже по изменённой процедуре прошли выборы Главы ДНР — теперь не через прямое народное волеизъявление, а по новой конституции, тайным голосованием в Народном совете ДНР. Совет проголосовал  и утвердил действующего главу ДНР — Д.В. Пушилина."
DPR_confiscate_property_of_ukrainian_oligarchs: "Конфискация имущества украинских олигархов"
DPR_confiscate_property_of_ukrainian_oligarchs_desc: "Глава ДНР Денис Пушилин подписал постановление Государственного комитета обороны ДНР, согласно которому недвижимость украинских олигархов Рината Ахметова и Сергея Курченко, а также 140 других граждан Украины и двух компаний, находящаяся на территории республики, конфискуется в пользу донецкого народа. Согласно тексту документа, власти прекращают в отношении указанных лиц \"право собственности и другие вещные права на объекты недвижимого имущества, расположенные на территории Донецкой Народной Республики, обращая их в государственную собственность без компенсации собственникам стоимости такого имущества\"."
DPR_MIA_policy: "Политика МВД"
DPR_MIA_policy_desc: "Даже несмотря на войну, в стране обязан царить порядок. Мы должны сделать так, чтобы наши матери не страшились выйти с ребёнком на улицу, чтобы жители могли спать спокойно, а все преступники должны понести жёсткое наказание."
DPR_struggle_against_bandit_gangs: "Борьба с бандами «оборотней в погонах»"
DPR_struggle_against_bandit_gangs_desc: "Разные бандиты становятся служителями порядка, чтобы в итоге исказить его и привести хаос. Они думают, что раз на них милицейские \"погоны\", они могут делать всё, что захотят, и никто им ничего не сделает. Не будет больше этого! Теперь, граждане могут не бояться, увидев работника милиции, потому что все предатели собственного народа понесут справедливое наказание."
DPR_stop_drug_trafficking: "Пресечь наркоторговлю"
DPR_stop_drug_trafficking_desc: "Из-за войны и бедности, к сожалению, в республике прямо цветут и пахнут наркотраффики. Они спокойно разкидывают шприцы где попало, абсолютно не подумав, что ими может случайно уколоться маленький ребёнок. Но и их час настал. Теперь все они попадут за решётку, и это послужит им уроком!"
DPR_support_corruption: "Конвертики влиятельным силовикам"
DPR_support_corruption_desc: "В Китае за коррупцию могут даже расстрелять, но полностью искоренить её всё равно не удаётся. Так стоит ли устраивать постоянные облавы и слежки, если Республику можно укрепить не жестким надзором, а дипломатией — предоставляя гарантии неприкосновенности и закрывая глаза на «конверты» и «чемоданы» в обмен на определённые решения?"
DPR_end_with_corruption: "Покончить с коррупционной заразой"
DPR_end_with_corruption_desc: "Покончить с коррупционной заразой"
DPR_restore_order_in_authorities: "Навести порядок в органах"
DPR_restore_order_in_authorities_desc: "Навести порядок в органах"
DPR_ban_activities_of_the_OSCE: "Запретить деятельность миссии ОБСЕ"
DPR_ban_activities_of_the_OSCE_desc: "За долгие годы войны на нашей земле, ОБСЕ не доказали своей эффективности. Они не сделали абсолютно ничего для урегулирования конфликта. Они были слепы к тому факту, что укронацисты издеваются над мирными жителями Донбасса. И мы больше не видим смысла в их нахождении здесь.\nПусть убираются прочь с нашей земли!"
DPR_Kievs_crimes: "Передать реестр преступлений Киева в СЦКК"
DPR_Kievs_crimes_desc: "Бандеровцы кричат на весь мир, что мы, якобы, обстреливаем их города и сёла, абсолютно умалкивая о том, что сами каждый день терроризируют наших граждан. Теперь их преступления не останутся незамеченными, а уж тем более - безнаказанными! Международное сообщество узнает о преступлениях киевской хунты, когда представители СЦКК (Совместного центра контроля и координации) увидят наши доказательства."
DPR_Donetsk_is_not_defeated: "Непобежденный Донецк"
DPR_Donetsk_is_not_defeated_desc: "Практически полное окружение Донецка в 2014 году, бои за аэропорт, террор в отношении мирных жителей, постоянные обстрелы и бомбардировки города, перебои с водой, электричеством и снабжением не сломили ни сам город, ни его жителей. Отродьям Бандеры не получится сокрушить гордый дух дончан, и донецкие розы будут цвести вновь."
DPR_help_from_loyal_milcorrs: "Прибегнуть к помощи лояльных военкоров"
DPR_help_from_loyal_milcorrs_desc: "Долгие годы Народная милиция жила и поддерживалась российскими \"военкорами\" (военными корреспондентами). Десятки журналистов и лидеров общественного мнения помогали народу Донбасса как медийно, так и организационно, проводя сборы на снаряжение для ополченцев и гуманитарную помощь для мирных граждан ДНР. Сейчас, когда боевые действия вспыхнули с новой силой, нам как никогда прежде нужна помощь братского российского народа для того чтобы сердце Республики продолжало биться."
DPR_glorify_liberators: "Медийная кампания Донецкой Милиции"
DPR_glorify_liberators_desc: "Недавно был создан официальный канал Народной милиции ДНР, в котором будут публиковаться все фронтовые сводки, сообщения, заявления и комментарии официальных представителей НМ ДНР, репортажи с мест обстрелов, а также о мероприятиях, в которых принимает участие Народная милиция. Нами будет подержан устоявшийся образ донецкого воина-освободителя — ратника, который не щадя живота своего защищает родной Донбасс."
DPR_people_deserve_freedom: "Народ, достойный свободы!"
DPR_people_deserve_freedom_desc: "Годы, проведённые под постоянными обстрелами, в нужде и потерях, закалили характер дончан. Этот народ больше никогда не поддастся на лживые обещания киевских политиков, которые в час беды бросали Донбасс на произвол судьбы, а затем перекладывали ответственность за свои ошибки на \"донецких ватников\". В свое время Гитлер выпустил директиву: шахтеров в плен не брать. И все мы понимаем почему – потому что нас не покорить! Мы не покоримся и вновь, выбрав свою настоящую судьбу."
DPR_propaganda_of_russian_world: "Активная пропаганда \"Русского мира\""
DPR_propaganda_of_russian_world_desc: "Долгие годы Россия помогала нам, но в то же время стремилась к возвращению Донбасса в состав Украины — это не могло не сказаться на настроениях населения. От прежнего огня желания объединиться с Россией остались лишь тлеющие угольки. Народ Донбасса в 2014 году сделал свой исторический, цивилизационный выбор. Мы прошли долгий и опасный путь домой. Каждый день нас пытаются запугать и уничтожить, но террор, всевозможные блокады и война, развязанная Украиной на нашей земле, оказались бессильны против выбора героического народа Донбасса. Настало время разжечь это пламя вновь: мы возвращаемся домой."
DPR_deal_with_opossition: "Убедить оппозицию"
DPR_deal_with_opossition_desc: "Оппозиция всегда была лишь номинальной силой в политических реалиях ДНР. Теперь необходимо провести работу таким образом, чтобы принятое решение было единогласным и чтобы никто не смог опорочить гордый выбор, к которому мы так долго стремились."
DPR_strengthen_ties_with_Russia: "Укрепить связи с правительством России"
DPR_strengthen_ties_with_Russia_desc: "Наш бюрократический аппарат будет усилен приглашёнными чиновниками из России. Молодые специалисты отправятся на курсы переподготовки в институты Российской Федерации, где смогут наладить связи с российскими коллегами как на низовом, так и на высшем уровне. Глава Республики будет всё активнее привлекать федеральные министерства к решению проблем ДНР."
DPR_shall_be_together: "«Будем вместе!»"
DPR_shall_be_together_desc: "«Дорогие земляки! Более восьми лет мы ждали этого момента. Ждали тревожными ночами и напряженными буднями, на фронте и в тылу. Ждали так, как ждут возвращения в семью после долгих лет разлуки. «Мы возвращаемся домой!» — это главный мотив всех наших дел и сражений, сокровенное желание и одновременно абсолютная уверенность в том, что наступит тот день, когда мы станем Россией! Друзья! Обращаюсь к каждому из вас со словами искреннего уважения и признательности. Благодарю за мужество, несокрушимую стойкость и веру в нашу Большую Родину. Голос каждого из вас подтвердит истину: Донбасс – это Россия!»\n\nДенис Владимирович Пушилин, Глава Донецкой Народной Республики"
DPR_to_his_home: "В родную гавань"
DPR_to_his_home_desc: "Долгие годы лишений были проведены ради этого момента — теперь мы официально стали частью России. Страх возвращения под контроль Украины и угрозы кровавой мести со стороны киевской хунты начал исчезать, сменяясь радостью и эйфорией. Мы направим эту энергию в созидательное русло — впереди у нас ещё много работы."
DPR_region_of_russia: "Полноправный регион России"
DPR_region_of_russia_desc: "Возвращение в состав России выводит нас в систему российской бюрократии и цифровых сервисов. Хотя большинство наших граждан уже были гражданами РФ, теперь необходимо урегулировать местные вопросы, постепенно переводя наши министерства и ведомства в соответствие со стандартами нашей новой Родины."
DPR_full_integration_of_infrastructure: "Полная интеграция инфраструктуры"
DPR_full_integration_of_infrastructure_desc: "Между Ростовской областью и ДНР мечутся машины коммунальных служб, энергетических и транспортных компаний, блестят всплохи сварки, звучит жужжание бензопил, суетится специальная техника. Долгие годы жизни в Украине на положении последнего в очереди за финансированием и 8 лет на подножном корме значительно подкосило нашу инфраструктуру, и теперь ее необходимо вновь привести в порядок."
DPR_russian_parties_in_Donetsk: "Российские партии в Донецке"
DPR_russian_parties_in_Donetsk_desc: "ЛДПР, КПРФ, Новые Люди, Единая Россия, Справедливая Россия — деятельность этих партий будет официально разрешена на территории ДНР, партии будут допущены к выборам в Народный Совет, будет разрешена агитация и общественная деятельность."
DPR_end_political_integration: "Закончить политическую интеграцию"
DPR_end_political_integration_desc: "Последние бумаги подписаны, чиновники прошли переаттестации, профильные министерства открыли свои представительства в городах, в школах приняли новые программы, и мы готовы идти дальше — идти с Россией, рука об руку."
DPR_expand_volunteer_activities: "Расширить волонтерскую деятельность в республике"
DPR_expand_volunteer_activities_desc: "Наши освобождение потом и кровью города и села покрыты шрамами и ранами войны, находясь в опасной близости от гуманитарной катастрофы, особенно там, где наша администрация не успела вникнуть во все проблемы. Военкоры вовремя сумели подсветить проблему и волонтерский опыт необходимо расширить и на освобожденные районы."
DPR_president_elections: "Подготовка к выборам президента"
DPR_president_elections_desc: "Подготовка к выборам президента"
DPR_young_fighters_with_nazism: "Юные борцы с нацизмом"
DPR_young_fighters_with_nazism_desc: "Долгие годы образование наших детей контролировалось киевской властью, навязывавшей чуждые нашему духу ценности западной Украины, погрязшей в идолопоклонничестве Бандере и прочим нацистским прихвостням. Для ДНР, где героизм юных подпольщиков «Молодой гвардии» занимает особое место, подобные нарративы вызывают лишь отторжение и гнев. Мы будем воспитывать своих детей, взращивая в них стремление к искоренению фашизма, где бы тот ни проявлялся."
DPR_russian_exp_in_patriotic_education: "Перенять российские практики патриотического воспитания"
DPR_russian_exp_in_patriotic_education_desc: "Наше сближение с Россией позволит заимствовать ряд образовательных практик, в том числе в области патриотического воспитания молодёжи. Цикл классных часов Разговоры о важном, внеурочные мероприятия, поисково-исследовательская работа, оформление школьных пространств в патриотическом стиле, а также патриотическое волонтёрство — все эти программы будут внедрены в наши образовательные методики."
DPR_mobilization_of_teenagers: "Военные сборы"
DPR_mobilization_of_teenagers_desc: "Компьютерные игры и социальные сети оказывают разлагающее влияние на наших детей, тогда как реальность всё настойчивее напоминает о себе артиллерийскими залпами и заглядывать в души черными глазами автоматных дул. Наши дети должны быть готовы к вызовам современности и уметь встать на защиту Родины, если потребуется."
DPR_yunarmiya: "Юнармия"
DPR_yunarmiya_desc: "Пройдя «курс молодого бойца» в Юнармии, молодые ребята становятся медиками, волонтерами, общественниками. Многие из них вступают в ряды Народной милиции и отправляются на фронт защищать свой родной край. Они такие разные, но всех их объединяют любовь к родной земле, участие в жизни общества и желание жить по чести и совести. Сейчас в разных городах Республики действует более 140 юнармейских отрядов. Сеть представительств постоянно расширяется, и мы обязательно этому посодействуем."
DPR_cadet_corps_Zaharchenko: "Кадетский корпус им. А. В. Захарченко"
DPR_cadet_corps_Zaharchenko_desc: "Как кадетский корпус учебное заведение начало свою работу 1 сентября 2017 г.  по инициативе первого Главы Донецкой Народной Республики. В 2018 году после гибели первого Главы ДНР было принято решение о присвоении кадетскому корпусу имени Александра Владимировича Захарченко. Обучающиеся школы - кадеты (5-11 учебные взводы) и прокадеты (1-4 классы) - кроме основной школьной программы осваивают дополнительные общеобразовательные программы, имеющие целью подготовку несовершеннолетних граждан к военной или иной государственной службе. "
DPR_russian_invests: "Освоить российские инвестиции"
DPR_russian_invests_desc: "Мы должны научиться эффективно использовать инвестиции, предоставленные нам российским правительством. Это требует умелого и стратегического подхода, направленного на финансирование ключевых отраслей нашей экономики. Нам необходимо активнее инвестировать в собственные производства, модернизировать инфраструктуру и улучшать социальные условия. Превращение этих вложений в реальный экономический рост не только преумножит наши доходы, но ещё и станет залогом процветания нашей Республики и повысит стабильность в регионе."