#Восстановление донецка
 DPR_we_must_be_in_safe: "Мы должны быть в безопасности!"
 DPR_we_must_be_in_safe_desc: "Энергетическая независимость – это не просто комфорт, а вопрос выживания. Мы строим щит, который защитит наш дом, наш город, нашу землю. Мы знаем цену теплу в зимние ночи и свету в темные времена. Безопасность – в наших руках, и никто не заставит нас жить во тьме!"
 DPR_civilian_defense: "Гражданская оборона"
 DPR_civilian_defense_desc: "Когда каждый знает своё дело, город становится крепостью. Резервные источники, защищённые сети, автономные системы – всё это щит, который не даст врагу оставить нас без света и тепла. Гражданская оборона – это сила, рожденная в единстве. Мы не просто выстоим – мы будем сильнее, чем прежде!"
 DPR_Russian_Iron_Dome: "Железный купол по-русски"
 DPR_Russian_Iron_Dome_desc: "Мы не ждём защиты извне – мы строим свою. Наш \"Железный купол\" – это инженерный гений, мощь технологий и воля людей. Ни одна угроза не оставит нас в темноте, потому что у нас есть своя броня. Там, где сила духа соединяется с мощью науки, рождается настоящая неприступность"
 DPR_steel_nights_of_Donetsk: "Железные ночи Донецка"
 DPR_steel_nights_of_Donetsk_desc: "Тьма – это не слабость, это испытание. Когда гаснут фонари, зажигается дух. Железные ночи Донецка – это время стойкости и несгибаемой воли. Мы пережили многое, и никакая тьма не сделает нас слабее. Донецк – город света в сердцах его жителей, и никакие удары не изменят этого."
 DPR_water_supply: "Обеспечить поставки воды"
 DPR_water_supply_desc: "Вода – это жизнь, и враг не отнимет у нас право на неё. Ни одна блокада, ни одна атака не оставит нас без живительной влаги. Мы строим новые маршруты, восстанавливаем сети, укрепляем источники. Каждый глоток воды – это глоток свободы, и мы не позволим никому перекрыть этот поток!"
 DPR_supplies_from_russia: "Поставки из России"
 DPR_supplies_from_russia_desc: "Россия – это сила, Россия – это поддержка, Россия – это надёжность. Когда враг пытается оставить нас без воды, наши братья подставляют плечо. Новые трубопроводы, цистерны, инженерные решения – водная артерия, идущая из России, не остановится. Мы знаем, кто с нами в трудную минуту, и эта помощь делает нас только крепче!"
 DPR_donetsk_water_system: "Подключить Донецк к водопроводу"
 DPR_donetsk_water_system_desc: "Донецк не должен зависеть от прихотей врага. Город-герой заслуживает стабильности и уверенности в завтрашнем дне. Новый водопровод – это не просто трубы, это символ несгибаемости, проект будущего, где никто и никогда не оставит нас без воды. Мы подключим Донецк к мощным источникам, и каждый житель почувствует: мы не просто держимся – мы побеждаем!"
 DPR_Organize_work_to_repair_energy_infrastructure: "Восстановление энергетической инфраструктуры"
 DPR_Organize_work_to_repair_energy_infrastructure_desc: "Каждый провод, каждая подстанция, каждый генератор – это шаг к светлому будущему. Враг разрушает, но мы строим. Мы поднимем упавшие линии, восстановим вышки, запустим турбины. Темнота – это временно, а сила нашего духа и труда – навсегда. Мы знаем, что значит остаться без света, и именно поэтому сделаем так, чтобы больше никто этого не почувствовал!"
 DPR_volounteers_from_russia: "Привлечь волонтеров из России"
 DPR_volounteers_from_russia_desc: "Россия – это не просто страна, это братская сила, которая всегда рядом. Когда нужна помощь – она приходит. Волонтёры, инженеры, строители, специалисты – это люди, которые не спрашивают, почему, а просто берут и делают. Вместе мы быстрее восстановим то, что враг пытался уничтожить. Вместе мы построим систему, которую уже ничто не сломит!"
 DPR_bring_in_Russian_fuel: "Завезти российское топливо"
 DPR_bring_in_Russian_fuel_desc: "Без топлива не будет движения, а без движения нет победы. Российское топливо – это энергия, тепло, мощь заводов, транспорт, генераторы. Пока у нас есть топливо – у нас есть жизнь, и никакая блокада этому не помеха. Завозы идут, системы налажены, резервы пополняются. Это не просто горючее – это кровь экономики, и мы будем сильнее с каждым литром!"
 DPR_stop_civilian_deaths: "Пресечь гибель мирного населения"
 DPR_stop_civilian_deaths_desc: "Мирные жители – это святое, это сердце наших городов, наших улиц, наших семей. Враг хочет посеять страх, но мы не позволим! Защита, эвакуация, укреплённые укрытия – мы делаем всё, чтобы люди были в безопасности. Каждый спасённый человек – это победа, и никто не сможет сломить наш народ, пока мы стоим стеной за друг друга."
 DPR_hum_aid_from_russia: "Раздача гуманитарной помощи из России"
 DPR_hum_aid_from_russia_desc: "Когда в тяжёлые времена протягивают руку помощи – это настоящая поддержка, это братство, это сила единства. Россия не просто отправляет гуманитарные грузы – она делится теплом, заботой, верой в нашу победу. Продукты, лекарства, одежда – всё, что нужно для жизни, идёт к тем, кто в этом нуждается. Мы выстоим, потому что мы вместе, а вместе – мы непобедимы!"
 DPR_narodnaya_druzhina: "Формирование народной дружины"
 DPR_narodnaya_druzhina_desc: "Когда враг пытается внести хаос, народ встаёт на защиту порядка. Народная дружина – это не просто патрули, это сила единства, готовность каждого стать частью защиты своего дома. Безопасность – это дело каждого, и мы не оставим улицы без присмотра. Наши дворы, наши семьи, наш порядок – в надёжных руках."
 DPR_people_who_deserve_to_live: "Народ, заслуживший жить!"
 DPR_people_who_deserve_to_live_desc: "Этот народ прошёл сквозь огонь и тьму. Его пытались сломить, оставить без света, воды, тепла, без будущего. Но он выстоял. Каждый шаг, каждое усилие – ради того, чтобы здесь была жизнь, настоящая, свободная, сильная! Мы заслуживаем жить, строить, любить, растить детей, смотреть в завтрашний день с уверенностью. Наша земля, наша судьба, наша победа – и никто её у нас не отнимет!"
