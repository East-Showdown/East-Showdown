l_english:
 BM_HISTORY_TITLE: "East Crisis"
 EAST_SHOWDOWN_2022_01_01_NAME: "Eastern Crisis"
EAST_SHOWDOWN_2022_01_01_DESC: "2022 - Eastern Crisis\n\nThe Eastern Crisis traces its origins back to the end of 2013, when the Euromaidan began in Ukraine. Initially triggered by the halt in signing the Ukraine-EU Association Agreement, it took on a national character after November 30 due to the brutal beating of student protesters by law enforcement on Independence Square.\n\nV. Yanukovych, the then President of Ukraine, fled to Russia, leaving behind economic stagnation, a decimated army, a broken Ukraine-EU association agreement, and much more.\n\nMeanwhile, Russia, accustomed to seeing Ukraine within its sphere of influence, watched the situation and tried to exert influence through its people in the government, organizing anti-Maidan protests, bribing thugs, and using various other methods.\n\nHowever, by the end of winter, more and more 'local militias,' also known as 'little green men,' began to appear in Crimea. Ukraine was unstable, a temporary government led by A. Yatsenyuk was formed, and A. Turchynov was appointed as the acting commander-in-chief of the army. In reality, the entire system of power was cracking due to the divide between pro-Ukrainian and pro-Russian views.\n\nThe peak of the crisis occurred on March 18, 2014, when Russia held a referendum in Crimea, followed by its annexation. Ukraine could do nothing...\n\nAt the same time, pro-Russian rallies were held across Eastern and Southern Ukraine, which were mostly either suppressed by authorities or pro-Ukrainian citizens. Notable incidents occurred in Odessa, Kharkiv, Donetsk, and Luhansk.\n\nAs Ukraine stabilized the regions, it faced irregular armed forces in the East. On April 12, the Anti-Terrorist Operation (ATO) in Eastern Ukraine was announced. The first key battles erupted in the summer, and by autumn, the Minsk agreements were signed, intended to stop the bloodshed and start a dialogue on returning the self-proclaimed republics to Ukraine.\n\nNevertheless, over these eight years, there have been sporadic skirmishes, mostly initiated by the LPR and DPR. On the other hand, the situation stabilized both along the demarcation line and in Ukraine. Over these years, a new president was elected, stability returned, economic development began, the army was rebuilt, reforms were implemented, and much more.\n\nClouds began to gather gradually from 2020, when Russia started amassing troops on the border with Ukraine. As of January 1, 2022, the situation is again descending into darkness. The diplomatic stalemate between the West and Russia only highlights Putin's determination to take matters into his own hands and resolve the Ukrainian issue. But will it happen?"
 UKR_EAST_SHOWDOWN_2022_01_01_DESC: "Following the flight of the incumbent president in 2014, on 20 February, Russia sent its troops into Crimea, which was subsequently occupied. In April 2014, protests in the Donetsk and Luhansk regions escalated into an armed conflict in which Russia supported the DPR and LPR.\n\nOn 24 February 2022, fighting was localised in the Donbass and Crimea.\n\nOn 21 February, Russia recognised the independence of the DPR and LPR, officially sent troops to their territory on 22 February, and on 24 February began a full-scale invasion of Ukraine."
 NTO_EAST_SHOWDOWN_2022_01_01_DESC: "NATO is a military-political bloc uniting most countries. It was founded on 4 April 1949 in the United States, to combat the possible expansion of communism. The founding countries of NATO are the USA, Canada, Iceland, the UK, Portugal, France, Belgium, Luxembourg, the Netherlands, Norway, Denmark and Italy. One of NATO's stated purposes is to provide deterrence of aggression or defence to NATO members and candidates for membership. At the moment, 30 countries are members of NATO, and 19 other countries participate in the Partnership for Peace programme. Georgia and Ukraine are also considered candidates for NATO membership, while Bosnia and Herzegovina received a membership plan back in December 18. Since 24 February, NATO has been providing various assistance to Ukraine."
 DPR_EAST_SHOWDOWN_2022_01_01_DESC: "On 12 May 2014, during the armed conflict in Donbass, the republics of the DPR and LNR, backed by Russia, declared their independence from Ukraine. A long conflict began, during which Ukraine managed to regain control over part of their territories. After a year of conflict, the Minsk ceasefire agreements were reached, although there were many skirmishes in the following years.\n\n21 February 2022, Russia recognised the independence of the DPR and LNR, and on 24 February, together with the republics, began a full-scale invasion of Ukrainian territory."
 BLR_EAST_SHOWDOWN_2022_01_01_DESC: "After the independence of the Republic of Belarus, the young and ambitious Alexander Lukashenko was elected president. During his rule, he gradually began to build his dictatorship and move closer to Russia. On 6 July 2010, Belarus joined the EAEU customs union and received many discounts on Russian goods. During the 2020 elections, Lukashenko was accused of fraud and large-scale protests began, which were later suppressed.\n/after the Russian-Ukrainian war began, the Republic of Belarus made its territory available to the Russian military and Russian military equipment."
 RUS_EAST_SHOWDOWN_2022_01_01_DESC: "In 2014, Russian Federation troops entered the territory of the Crimean peninsula, which was controlled by Ukraine. During the occupation, Western sanctions were imposed against Russia, which negatively affected the Russian economy. In April 2014, protests in Ukraine's Donetsk and Luhansk regions escalated to the stage of armed conflict, during which Russia supported the self-proclaimed DPR and LNR.\n\n21 February, Russia recognised the independence of the DPR and LNR, officially introduced troops into their territory on 22 February, and launched a full-scale invasion of Ukraine on 24 February."
 WGN_EAST_SHOWDOWN_2022_01_01_DESC: "PMC Wagner is believed to have been established in 2014 by Russian businessman Yevgeny Prigozhin and former employee of PMC Slavyansky Korps Dmitry Utkin, who had the call sign "Wagner"." For the first time the activities of the Wagner group became known after reports about mercenaries fighting on the side of separatists in Donbass. The media wrote about the PMC's presence in Syria in 2016 and active participation in the storming of Palmyra, and according to the UN, more than a thousand Wagner fighters have been deployed on the territory of Libya since October 2018. The Wagner Group has also been credited with operations in CAR, Sudan and a host of other African countries. Following Russia's invasion of Ukraine on 24 February, PMC Wagner entered the war on Russia's side."
 LPR_EAST_SHOWDOWN_2022_01_01_DESC: "On 12 May 2014, during the armed conflict in Donbass, the republics of the DPR and LNR, supported by Russia, declared their independence from Ukraine. A long conflict began, during which Ukraine managed to regain control over part of their territories. After a year of conflict, the Minsk ceasefire agreements were reached, although there were many skirmishes in the following years.\n\n21 February 2022, Russia recognised the independence of the DPR and LNR, and on 24 February, together with the republics, began a full-scale invasion of Ukrainian territory."
 POL_EAST_SHOWDOWN_2022_01_01_DESC: "Poland is a country in Central Europe with access to the Baltic Sea. Member of the European Union and the NATO bloc. The sixth largest economy in the European Union. At the same time, its wary attitude towards Russia is the result of very tense diplomatic relations, which have steadily deteriorated since Vladimir Putin came to power. This is an important factor in Poland's special attention to the political reorientation of all its eastern neighbours. After Russian troops invaded Ukraine, Polish President Andrzej Duda signed the Defence of the Fatherland Act, under which the Polish army will be modernised and its strength will be doubled to 300,000 men."
 PMR_EAST_SHOWDOWN_2022_01_01_DESC: "The Transdniestrian Moldovan Republic (TMR) is an unrecognised state between Ukraine and Moldova. It emerged as a result of an armed rebellion supported by Russia. In 1992 our country declared independence from Moldavia, many did not think that we would be able to withstand the onslaught of Moldovan troops, but in time arrived volunteers from the Russian Federation, which established the current borders, and also helped to freeze the conflict. As of 2022 our country is one of the most backward in Europe, our actions are almost completely controlled by the Russian Federation, in return they give us defence. After the events of 24 February the DMR was left behind, the question is for how long?"
 CHE_EAST_SHOWDOWN_2022_01_01_DESC: "Chechnya is legally an autonomous sub-unit of the federation, but in reality has a de facto independent internal policy from the centre. Founded on 9 January 1993, Chechnya has always had a special status in Russian domestic politics. However, after the first and second Chechen wars and the rise to power of Putin and Ramzan Kadyrov, Chechnya was given a special extra-legal status. As in all regions of the country, after centralisation in Vladimir Putin's first two terms, any economic independence of Chechnya was smashed. In return for Putin's absolute loyalty, Ramzan Kadyrov turned Chechnya into his de facto "Toy" where he is almost a god and can do anything with absolute impunity. This is the situation in which Chechnya has approached February 2022."
 EAST_SHOWDOWN_NAME: "Eastern Crisis"
 COUNTRY_SELECTION_CHARACTER_DESC: "$NAME|Y$\n-------------------------------------\n$TRAITS_DESC|$"
EAST_SHOWDOWN_DESC: "2014: The Beginning of Political Instability\n\nIn 2014, relations between Russia and Ukraine entered a phase of serious instability. Political changes in Ukraine, including the Euromaidan movement and the ousting of President Yanukovych, led to an internal crisis and a deep divide within Ukrainian society.\n\nIn response to the events in Kyiv, Russia annexed Crimea, citing the need to protect the Russian-speaking population and its strategic interests. This move triggered sharp international condemnation and became the basis for the imposition of economic sanctions against Russia.\n\nAt the same time, an armed conflict broke out in the eastern regions of Ukraine between the Ukrainian army and pro-Russian militias, further complicating the situation in the region.\n\n2014–2022: A Protracted Conflict\n\nAfter the annexation of Crimea and the outbreak of hostilities in Donbas, Ukraine became embroiled in a prolonged conflict. Multiple attempts were made to resolve it through the Minsk Agreements, but the implementation of these accords was continually hampered by ceasefire violations and the lack of a lasting compromise between the parties.\n\nDuring this period, Russia faced increasing economic sanctions, while Ukraine moved closer to Western countries, strengthening its cooperation with the EU and the United States and receiving military and economic support from them.\n\n2022: A World on the Brink of War\n\nAt the beginning of 2022, the situation reached a peak of tension: the Russian side demanded guarantees for its own security and the protection of the Donbas population from perceived threats. It pointed to the potential further expansion of NATO eastward and the possible deployment of offensive weapons near its borders as major concerns for the Russian leadership.\n\nIn January and February 2022, negotiations were held between Russia and NATO, during which Russia demanded legally binding security guarantees — including a refusal to admit Ukraine and other post-Soviet countries into the North Atlantic Alliance, as well as a ban on the deployment of offensive missile systems and foreign troops near Russian borders.\n\nThe negotiations failed to produce a mutually acceptable outcome: NATO leaders emphasized every nation’s right to choose its own allies and security arrangements, while the Russian side interpreted the lack of compromise as a disregard for its core concerns and a signal for further escalation."
UKR_EAST_SHOWDOWN_DESC: "After the Soviet Union’s dissolution in December 1991, Ukraine declared independence and gained international recognition. Inheriting a developed industrial base, skilled workforce, and formidable military—including nuclear weapons, which they relinquished in 1994 under the Budapest Memorandum in exchange for security assurances—Ukraine entered a challenging early 1990s marked by economic crisis, hyperinflation, and post-Soviet institutional collapse.\n\nUkraine's political system evolved into a pluralist but unstable framework. Oligarchic clans, corruption, and weak institutions eroded public trust. President Leonid Kuchma (1994–2005) pursued a multi-vectored approach between Russia and the West, reinforcing an oligarchic system. The pivotal Orange Revolution in 2004, sparked by election fraud, brought pro-West candidate Viktor Yushchenko to power but strained ties with Russia. Disillusionment with reforms later enabled a resurgence of pro-Russian forces.\n\nIn 2010, Viktor Yanukovych, representing eastern and southern Ukraine, became president and moved closer to Moscow. However, protests triggered by his veto of an EU association agreement in 2013 escalated into the Euromaidan (‘Revolution of Dignity’). In February 2014, Yanukovych fled, and a pro-European government took charge—transforming Ukraine’s path. Russia responded by annexing Crimea in March 2014, and the Donbas conflict erupted with Moscow’s backing. Ukraine was plunged into a prolonged war involving hybrid tactics: information warfare, economic pressure, and cyberattacks.\n\nSince 2014, Ukraine implemented extensive reforms in defense, governance, anti-corruption, and decentralization. Despite challenges, it achieved notable progress integrating with the EU and NATO. In 2019, comedian Vladimir Zelensky was elected on a platform promising anti-corruption, peace, and systemic reboot. By January 2022, Ukraine remained independent but geopolitically vulnerable—navigating reforms, rising national identity, Western alignment, persistent internal issues, and the looming threat of a large-scale Russian invasion."
NTO_EAST_SHOWDOWN_DESC: "The North Atlantic Alliance (NATO) was founded on April 4, 1949, as a military-political bloc of Western European and North American countries. Its primary objective was collective defense against potential aggression from the USSR and the Warsaw Pact. The key principle of the Alliance—Article 5 of the Washington Treaty—states that an attack on one member is considered an attack on all.\n\nAfter the collapse of the USSR and the end of the bipolar world, NATO not only survived but expanded to include Central and Eastern European countries formerly under Soviet influence. The first waves of expansion (1999, 2004) included Poland, the Czech Republic, the Baltic states, and the Balkans, provoking a negative reaction from Moscow, which saw this as a violation of informal agreements from the time of German reunification.\n\nAfter 2014, against the backdrop of Crimea's annexation and the conflict in Donbas, NATO-Ukraine cooperation deepened significantly. Although Ukraine did not receive membership status, it was recognized as an important partner. NATO provided Kyiv with comprehensive political, advisory, and technical support. Joint exercises were intensified, non-lethal aid was supplied, and cooperation in command, communications, cyber defense, and security sector reform was strengthened.\n\nIn 2016, at the Warsaw Summit, a Comprehensive Assistance Package for Ukraine was adopted, encompassing dozens of projects for army modernization, crisis management, logistics, and countering hybrid threats. NATO actively supported reforms in Ukraine's defense sector, insisting on the adoption of NATO standards.\n\nDuring Donald Trump's presidency (2016–2020), Ukraine remained a priority despite his general skepticism toward international alliances. The U.S., as NATO's largest member, continued military aid to Ukraine, including lethal weapons like Javelin anti-tank systems, drones, and communications equipment. The presence of U.S. and other NATO troops also increased in neighboring countries—Poland, Romania, and the Baltics—as a deterrent against Russia.\n\nIn December 2021, amid rising tensions and Russian troop buildup near Ukraine's borders, a round of talks was held between Russia, the U.S., and NATO. Moscow demanded legally binding guarantees against NATO expansion to the east, including a refusal to admit Ukraine. NATO reaffirmed its open-door policy and rejected the ultimatum, stating that Russia could not dictate security terms to other countries. The talks ended inconclusively, and the diplomatic pause became a prelude to further military conflict."
DPR_EAST_SHOWDOWN_DESC: "In the spring of 2014, amid Ukraine's political crisis following the Revolution of Dignity and Viktor Yanukovych's flight, pro-Russian protests intensified in the Donetsk region. On April 7, 2014, armed activists seized the Donetsk Regional Administration building and proclaimed the Donetsk People's Republic (DPR). Ukrainian authorities labeled these actions as separatism, launching an Anti-Terrorist Operation (ATO), which escalated into armed conflict.\n\nFrom the outset, the DPR enjoyed Russian support—political, economic, personnel, and military—though Moscow officially denied direct involvement. By spring and summer 2014, clashes between Ukrainian forces and DPR militias turned into a positional war. The fiercest battles occurred near Sloviansk, Donetsk, and Ilovaisk. After the Ilovaisk tragedy in August and the intervention of Russian-backed forces, the conflict was frozen under the Minsk Agreements.\n\nBy 2015, the frontlines stabilized, but peace remained elusive. The DPR maintained de facto control over parts of Donetsk Oblast, including Donetsk, Makiivka, Horlivka, and other towns. The DPR's power structure was shaped by military commanders, pro-Russian politicians, and Russian administrators. Internal conflicts among factions, including the elimination of key warlords (such as Mozgovoy, Batman, Givi, and Motorola), led to tighter centralized control.\n\nFrom 2016 to 2021, the DPR gradually transformed into a quasi-state entity dependent on Russia. Its economy stagnated: much of its industry was destroyed or integrated into Russia's economic system. The population relied on pensions, social payments, and Russian humanitarian aid.\n\nBy January 2022, the DPR was a partially recognized, de facto Russian-controlled entity with a rigid power structure, limited civil freedoms, a militarized society, and complete dependence on external support. The entrenched conflict with Kyiv and gradual absorption by Russian structures made the DPR an inseparable element of the broader geopolitical confrontation between Russia and the West."
BLR_EAST_SHOWDOWN_DESC: "After the USSR's collapse in December 1991, the Republic of Belarus declared independence and pursued stability and economic continuity. Its first president, Alexander Lukashenko, elected in 1994, quickly consolidated power, relying on Soviet-era bureaucracy and security forces. The country maintained a centralized economy with a significant state sector, ensuring relative social stability amid crises in other post-Soviet states.\n\nIn the 1990s, Belarus avoided major regional conflicts and political upheavals, but limited political competition and strict media control created an authoritarian model. Lukashenko used Soviet-era symbolism and stability slogans, securing support among much of the population.\n\nIn the 2000s, Belarus strengthened economic and political ties with Russia, particularly through the Union State and Customs Union, while balancing between Moscow and the West. Its foreign policy was pragmatic but prioritized regime preservation and sovereignty.\n\nThe Ukrainian crisis and mass protests against the 2020 presidential election results heightened Minsk's fear of color revolutions and foreign interference. This led to a crackdown on opposition and tighter control. Belarus maintained close ties with Russia while avoiding direct involvement in Ukraine's conflict.\n\nBy January 2022, Belarus was an authoritarian state with power concentrated around Lukashenko, limited political freedoms, and a dominant role for security services. It remained a key Russian ally, especially in military and economic spheres, amid rising regional tensions."
RUS_EAST_SHOWDOWN_DESC: "After the USSR's collapse in December 1991, the Russian Federation inherited international recognition, a nuclear arsenal, and a UN Security Council seat but faced political and economic instability. The 1990s were marked by crisis: plummeting living standards, mass privatization, weak central authority, and regional separatism, including in Chechnya.\n\nVladimir Putin's rise to power in 2000 centralized authority. Federal institutions were strengthened, media and opposition parties were controlled. High oil prices stabilized the economy, boosting incomes and reducing poverty—creating the image of the \"stable 2000s.\" This bolstered Putin's popularity and solidified his power vertical. Foreign policy shifted toward restoring influence in the post-Soviet space through integration projects like the Eurasian Economic Union and CSTO.\n\nThe turning point came in 2004 with Ukraine's Orange Revolution—the first major blow to the \"Russian world\" project. In 2008, Russia intervened in Georgia, demonstrating its willingness to use force abroad. After Ukraine's 2014 Revolution of Dignity and Yanukovych's ouster, Russia annexed Crimea and backed armed groups in eastern Ukraine, sparking open conflict.\n\nSince 2014, Russia has faced sanctions, militarization, and tighter societal control. Ukraine, meanwhile, accelerated its NATO and EU integration with Western support. The Kremlin viewed this as a direct security threat and the loss of a strategic neighbor.\n\nBy January 2022, Russia was at a peak of tension: with a rigid power vertical, no political competition, a dominant role for security forces, and growing foreign confrontation. Massive troop deployments near Ukraine's borders and ultimatums to the West foreshadowed further escalation."
WGN_EAST_SHOWDOWN_DESC: "The private military company 'Wagner' (PMC Wagner) is an unofficial structure linked to Russian mercenary activities abroad. Despite lacking official recognition in Russia, PMC Wagner became a tool of Kremlin foreign policy in conflict zones where direct military intervention was undesirable or politically sensitive.\n\nIts precursor was the 'Slavonic Corps,' a group of mercenaries sent to Syria in 2013 to guard energy facilities. The operation failed, with some fighters detained upon return. However, this laid the groundwork for a more controlled and secretive structure.\n\nPMC Wagner actively formed in 2014 amid the Donbas conflict. A unit under former GRU officer Dmitry Utkin (call sign 'Wagner') participated in battles for Debaltseve, Luhansk Airport, and Ilovaisk. Its ranks reportedly included veterans of Russian security forces operating as 'volunteers.'\n\nKey to its rise was informal patronage by businessman Yevgeny Prigozhin—a St. Petersburg restaurateur, oligarch, and Putin ally. From 2014, Prigozhin-affiliated entities funded, supplied, and politically shielded Wagner. Contracts for recruitment and security services abroad were managed through his business empire (e.g., 'Concord').\n\nFrom 2015, Wagner became a key instrument of Russian intervention in Syria's civil war. Its units guarded strategic sites, supported Syrian army offensives, and secured oil infrastructure. A notorious incident occurred on February 7, 2018, near Deir ez-Zor, where Wagner fighters attacked U.S.-backed Kurdish forces, resulting in up to 100 mercenary deaths from U.S. airstrikes. Wagner also expanded into Africa, notably Libya and the Central African Republic."
LPR_EAST_SHOWDOWN_DESC: "The Luhansk People's Republic was proclaimed on April 27, 2014, amid pro-Russian protests in Luhansk Oblast following Kyiv's post-Revolution of Dignity power shift. Like in Donetsk, protesters seized administrative buildings, held a 'referendum' on independence on May 11, 2014, and declared the LPR. Ukraine deemed these actions separatist and launched a military operation to restore control.\n\nThroughout spring and summer 2014, Luhansk Oblast saw intense fighting near Luhansk, Schastia, Lysychansk, and Debaltseve. After Ukrainian advances, a Russian-backed counteroffensive in August stabilized the frontlines, leading to the Minsk Agreements.\n\nIn subsequent years, the LPR, like the DPR, became an unrecognized quasi-state dependent on Russian support. Its power structure initially revolved around warlords, leading to internal purges, coups, and the elimination of key figures (e.g., former 'premier' Gennady Tsypkalov). Power gradually shifted to Moscow-loyal administrators.\n\nMilitary tensions persisted, with regular ceasefire violations along the contact line. Both sides accused each other of undermining peace. Meanwhile, the LPR formed armed forces modeled on Russia's, with instructors and supplies from Russia.\n\nBy January 2022, the LPR was a fully Moscow-dependent territory with high militarization, authoritarian rule, and a ruined economy. Escalating Russia-West tensions and border buildup made it a potential flashpoint."
POL_EAST_SHOWDOWN_DESC: "After the USSR's collapse and leaving the Warsaw Pact, Poland pursued integration into Western structures. In 1991, it co-founded the Visegrád Group and rapidly reformed its economy and political system. Poland became one of the first Eastern European countries to successfully transition to a market economy and parliamentary democracy.\n\nIn 1999, Poland joined NATO; in 2004, the EU. These steps cemented its strategic alignment, making it a key Western outpost on the eastern flank. Polish foreign policy since has been Atlanticist, emphasizing close ties with the U.S. and support for its eastern neighbors' Euro-integration, especially Ukraine's.\n\nFrom the 2000s, Poland actively backed Ukrainian independence and European aspirations. Warsaw supported the 2004 Orange Revolution and the 2014 Revolution of Dignity. After Crimea's annexation and the Donbas war, Poland took a hardline anti-Russian stance, advocating for tougher EU sanctions and providing Ukraine political, humanitarian, and military aid.\n\nPolish-Ukrainian relations were strategic but complex. Historical issues—like WWII-era Volhynia massacres—periodically resurfaced in debates. However, since 2014, pragmatism prevailed amid shared threats.\n\nPoland became a transit hub for Western aid to Ukraine, a training ground for Ukrainian troops, and a platform for intelligence sharing. Polish politicians—both conservative (e.g., Law and Justice Party) and liberal—consistently championed Ukraine in Europe and internationally.\n\nBy January 2022, Poland was pivotal in EU and NATO eastern policy. It pushed for stronger Alliance presence in the region, developed its own defense capabilities, and prepared for potential destabilization. Relations with Ukraine reached strategic partnership levels, united by shared Russian threats, economic ties, and Europe's largest Ukrainian diaspora."
PMR_EAST_SHOWDOWN_DESC: "After the USSR's 1991 collapse, the predominantly Russian-speaking, pro-Russian eastern Moldovan region proclaimed the Pridnestrovian Moldavian Republic (PMR). Fears of Romanianization and unification with Romania drove its secession from Chișinău, sparking armed conflict.\n\nIn 1992, clashes between Moldovan forces and pro-Russian PMR militias escalated into a brief but bloody war. Russia's 14th Army, stationed in the region since Soviet times, intervened, freezing the conflict. The PMR became de facto independent but legally part of Moldova.\n\nThroughout the 1990s–2000s, the PMR developed as an unrecognized quasi-state with its own constitution, flag, currency, and education system. Russian support—military and economic—was its lifeline. Russia provided free gas and maintained troops under a 'peacekeeping' pretext.\n\nThe PMR's political system was authoritarian with token multipartyism. Its first and longest-serving leader, Igor Smirnov (1991–2011), was succeeded by Yevgeny Shevchuk and Vadim Krasnoselsky, who preserved pro-Russian policies while implementing minor reforms.\n\nThe economy relied on Russian aid, shadow trade, and the 'Sheriff' conglomerate, which dominated local markets and politics. Despite international mediation attempts (e.g., the '5+2' format), no settlement was reached.\n\nBy January 2022, the PMR remained an unrecognized, Russian-dependent entity with anti-Moldovan, anti-Western rhetoric, militarization, and Russian troops. It served as a Kremlin tool to counter Moldova's Euro-integration."
CHE_EAST_SHOWDOWN_DESC: "Legally, Chechnya remains a subject of the Russian Federation, but de facto it conducts independent domestic policy. Its special status began to form in the 1990s, when after the collapse of the USSR, the republic declared independence as the Chechen Republic of Ichkeria. The First Chechen War (1994–1996) ended in a de facto victory for the militants and a temporary withdrawal of federal troops.\n\nIn the second half of the 1990s, Chechnya came under the control of field commanders and Sharia courts. With the start of the Second Chechen War in 1999, the federal center reestablished control. The Kremlin installed Akhmad Kadyrov, former mufti of the CRI who had sided with the federal forces, as the head of the newly formed entity. After his assassination, his son Ramzan took power. The remaining militants, driven out of Chechnya, proclaimed the Caucasus Emirate by 2007 — a radical underground that rejected the idea of Ichkeria and adopted the path of jihad across the entire North Caucasus.\n\nThe late 2000s and 2010s became a period of strengthening Ramzan Kadyrov’s personal power. With strong financial support from the federal budget, the republic was almost completely rebuilt: Grozny was transformed into a modern city with elements of Eastern monarchical architecture and a personality cult around Kadyrov Sr. Large-scale projects such as the ‘Heart of Chechnya‘ mosque became symbols of the new order, in which Islam, loyalty to the Kremlin, and a cult of strength merged into a single ideology.\n\nOutside the region, Kadyrov gained a reputation as a ‘regional satrap‘ with informal influence extending to the federal level, especially in matters related to the security apparatus. Chechen security forces were accused of systematic abductions both in Chechnya and beyond. Victims included local regime critics, federal human rights defenders, journalists, and Chechen expatriates living in other parts of Russia or even abroad. In addition, ‘Kadyrovtsy‘ were suspected of involvement in several high-profile political assassinations, including the 2015 murder of opposition politician Boris Nemtsov — right outside the Kremlin walls.\n\nBy early 2022, Chechnya was functioning de facto as a quasi-state entity within the Russian Federation: with its own foreign policy rhetoric, military formations, unique political culture, and a complete absence of federalism in the classical sense. Nevertheless, the republic formally remained part of the Russian legal framework, maintaining absolute loyalty to the Kremlin."

 EAST_SHOWDOWN_2022_04_15_NAME: "The Battle for Donbass"
 EAST_SHOWDOWN_2022_04_15_DESC: "April 15, 2022 — The Battle for Donbass\n\nOperation \"Mongoose Throw\" planned by the Russian General Staff, failed. Ukraine did not bow to submission, negotiations in Istanbul failed, and their results did not satisfy either side. Despite this, the Russian army is still strong; it continues to hold significant territories of Ukraine, still blocks the surrounded units of the Armed Forces of Ukraine in Mariupol, and is capable of conducting large-scale offensive operations. Protests in the rear have been suppressed, the opposition has been driven out of the country, and the economy is holding up under thousands of sanctions much more confidently than many prominent experts and analysts predicted. The Russian establishment seems to have changed the goal of the war, focusing on the liberation of Donbas, and Russia has all the strength to do so, despite the looming crisis in manpower recruitment, heavy losses in equipment, and significant blows to its navy.\n\nThe situation on the Ukrainian side looks much more positive: having managed to hold out at the very beginning of the war, when everything hung in the balance, the Armed Forces of Ukraine managed to hold on to the main cities and staunchly defend the fortified areas of Donbas. What Russia considers a peacekeeping gesture is the result of stubborn resistance and dozens of burned-out convoys of equipment. The invaders even had to flee from Kyiv, Chernihiv, and Sumy under pressure from the Ukrainian army. Russia is still capable of capturing some cities, but this will be a profitable exchange for Ukraine — territory in exchange for time and the blood of the Russian army.New brigades are being formed in the rear, and an endless stream of money, weapons, and intelligence is flowing across the border. The population has responded to the war with patriotic fervor, and there are lines of volunteers at military registration offices. Citizens and politicians with active pro-Russian positions have been arrested, and the Verkhovna Rada is more united than ever. It seems as if Ukraine will only grow stronger and regain all its lost territories.\n\nMeanwhile, the little-known Molkino base was receiving one plane after another. A private military company that had made a name for itself in the Middle East and Central Africa, led by a very charismatic leader, had already begun to fulfill its new contract with the Motherland..."
 UKR_EAST_SHOWDOWN_2022_04_15_DESC: "Millions of refugees continue to flee to Europe, but most of the population remains in a patriotic fervor. Also, despite the unequal battle and constant attacks from the enemy, the Ukrainian army is putting up a truly heroic defense.\n\nThe full-scale invasion has undoubtedly shaken the Ukrainian state. In the first days of the war, a huge number of civilians were killed. Western analysts unanimously believed that Kyiv would be captured within the first 72 hours. However, the Russian retreat from Kyiv, Chernihiv, and Sumy showed that the Russian army can be defeated and also boosted the morale of the Ukrainian people. In addition, hundreds of pieces of equipment and ammunition were captured, which will now serve the Armed Forces of Ukraine.\n\nDespite the procrastination of Western countries and their unwillingness to enter the war, Ukraine remains on course for NATO and EU membership. After the victory in the north, Europe began supplying weapons, thanks to which the Ukrainian army is becoming stronger. \nAnd although Ukraine has managed to stabilize the front,  difficult trials await it. The enemy is transferring forces from the north to Donbas, storming Popasna, pushing towards Severodonetsk and Mykolaiv, and the civilian population is under constant rocket fire. Although the Armed Forces of Ukraine have imposed an asymmetric war on the enemy, they still suffer from a lack of control and incompetent command."
 RUS_EAST_SHOWDOWN_2022_04_15_DESC: "After launching a full-scale invasion on February 24, 2022, Russia deployed large-scale military operations against Ukraine, engaging forces in the north, east, and south. By early April, Russia had suffered a series of military defeats, with Russian units being withdrawn from the Kyiv, Chernihiv, and Sumy regions, after which a “regrouping” and concentration of efforts in the Donbas was officially announced. As of mid-April, the main combat operations are concentrated in the eastern regions of Ukraine, while missile strikes on military and critical infrastructure throughout the country continue.\n\nIn the conflict, Russia is the initiator of the so-called “special military operation” and declares its goals to be the ‘demilitarization’ and “denazification” of Ukraine, as well as the protection of the Russian-speaking population and the interests of self-proclaimed entities such as the Donetsk and Luhansk People's Republics in the east of the country. Support for these territories is provided through military and logistical means, including the participation of regular troops, the supply of weapons, and the coordination of actions.\n\nOn the international stage, Russia has faced massive sanctions pressure from Western countries and their allies, which has resulted in restrictions on financial transactions, asset freezes, the departure of many companies and services from the Russian market, and a reduction in technology imports. In the future, Russia will likely continue its military operations with a focus on the east, seeking to consolidate control over the occupied territories while simultaneously rebuilding its economy under sanctions and strengthening cooperation with countries that did not support the restrictions."
 NTO_EAST_SHOWDOWN_2022_04_15_DESC: "After Russia invaded Ukraine on February 24, 2022, NATO focused on strengthening its eastern flank and coordinating its actions. The alliance activated its defense plans and increased its military presence in Poland, the Baltic states, Romania, and Slovakia, deploying additional rapid response forces there. NATO emphasized that it is not a party to the conflict but considers Russia's actions a threat to European security.\n\nSupport for Ukraine comes through NATO member countries. Many are supplying Kyiv with weapons, ammunition, anti-tank and anti-aircraft systems, sharing intelligence, allocating funds, and training Ukrainian military personnel. In addition, NATO has improved information sharing and coordination of supplies and strengthened its air defense and missile defense systems in the east.\n\nBy April 15, 2022, NATO had moved to a new phase of collective defense, adapting its strategy to the situation. The alliance will likely continue to increase its military presence in Eastern Europe, develop infrastructure, and improve the readiness of its response forces, while trying to avoid direct confrontation with Russia. NATO will continue its long-term support for Ukraine through its allied countries."
 POL_EAST_SHOWDOWN_2022_04_15_DESC: "After Russia launched a full-scale invasion of Ukraine, Poland quickly became a key state on NATO's eastern flank and the main logistical hub for aid to Kyiv. Warsaw put its armed forces on high alert, strengthened border security, and began accepting Ukrainian refugees en masse, while simultaneously pushing for the toughest sanctions against Moscow within the European Union. The Polish leadership has openly sided with Ukraine, viewing it as a strategic partner and a buffer against the further expansion of Russian influence in the region.\n\nThis support is both military and political-economic in nature: Poland is transferring weapons and equipment (including modernized T-72 tanks, ammunition, and air defense systems), providing humanitarian aid, organizing training for Ukrainian military personnel, and using its territory as the main transit corridor for Western supplies. At the same time, the country is strengthening cooperation with the US and other allies, seeking to increase NATO's military presence on its territory.\n\nBy April 15, 2022, Poland had effectively become one of the main architects of the Eastern European line of containment against Russia. In the future, Warsaw will most likely continue to build up its army and defense budget, expand its military infrastructure, supply weapons to Ukraine, and pressure its EU partners to maintain and tighten sanctions, seeking to cement its role as the leading military and political power in the region."
 BLR_EAST_SHOWDOWN_2022_04_15_DESC: "With the start of Russia's invasion of Ukraine, Belarus provided its territory for the deployment of Russian troops, effectively turning into a springboard for an attack on Kyiv and Chernihiv from the north. Minsk officially supported Moscow, while the country's leadership repeatedly stated that there was no need for the Belarusian army to participate directly in hostilities, emphasizing that Belarusian servicemen were not fighting on Ukrainian territory.\n\nThe support is of a military-technical and logistical nature, with supplies to the Russian group, repairs of equipment, and missile launches being carried out through Belarus. In April 2022, more than 22,000 tons of ammunition were removed from Belarusian warehouses. According to an OSCE report, Belarus is not de jure a party to the conflict, but it does not correspond to the status of a neutral state either.\n\nBy April 15, 2022, Belarus faced serious challenges: unprecedented Western sanctions, a deteriorating economic situation, and extremely low public support for the country's participation in the war. In this regard, Minsk is likely to intensify its diplomatic efforts, insisting on participation in peace talks and seeking to distance itself from the role of a direct participant in the conflict, while continuing to maintain allied relations with Moscow and remaining Russia's key military-strategic partner in the region."
 DPR_EAST_SHOWDOWN_2022_04_15_DESC: "By April 15, 2022, the Donetsk People's Republic, whose independence was recognized by the Russian Federation on February 21, is not just a party to the conflict, but a key ally of Russia and the main theater of the most fierce fighting. After the active phase of the conflict began on February 24, units of the DPR People's Militia, supported by the Russian Armed Forces, launched a decisive offensive, fighting heavy battles to liberate the southern and western regions of the former Donetsk Oblast.\n\nThe republic receives comprehensive support from the Russian Federation, which considers the defense of the DPR to be one of the key objectives of the operation. This support consists of full military coordination: the DPR army is operating as part of the Joint Group of Forces, receiving heavy weapons and fire support from the Russian Armed Forces in the battles for Mariupol (including the Azovstal plant) and in the Volnovakha direction, as well as assistance in demining and ensuring curfew in the liberated territories.\n\nIn the future, the DPR leadership, headed by Denis Pushilin, aims to completely liberate the territory of the republic within the administrative borders of the former Donetsk region. The political outlook for April 15 is seen in deeper integration with the Russian Federation, including possible accession to Russia, an issue that is being actively discussed, although official procedures have not yet been launched. The republic is completely dependent on Moscow's military and economic support, remaining its reliable outpost on the southern flank."
 LPR_EAST_SHOWDOWN_2022_04_15_DESC: "By April 15, 2022, the Lugansk People's Republic, whose independence was recognized by the Russian Federation on February 21, is not just a party to the conflict, but a key ally of Russia and a springboard for an offensive in the northern direction. After the active phase of the conflict began on February 24, units of the LPR People's Militia, supported by the Russian Armed Forces, launched a decisive offensive, fighting heavy battles to liberate the northern regions of the former Luhansk Oblast.\n\nThe republic receives comprehensive support from the Russian Federation, which considers the defense of the LPR to be one of the key objectives of the operation. This support consists of full military coordination: the LPR army operates as part of the Joint Group of Forces, receiving heavy weapons and fire support from the Russian Armed Forces in the battles for Rubizhne, Popasna, and on the approaches to Severodonetsk, as well as assistance in demining and ensuring curfew in the liberated territories.\n\nIn the future, the LPR leadership, headed by Leonid Pasechnik, aims to completely liberate the territory of the republic within the administrative borders of the former Luhansk region. The political outlook for April 15 is seen in deeper integration with the Russian Federation, including possible accession to Russia, an issue that is being actively discussed, although official procedures have not yet been launched. The republic is completely dependent on Moscow's military and economic support, remaining its reliable outpost on the northern flank."
 PMR_EAST_SHOWDOWN_2022_04_15_DESC: "With the outbreak of war in Ukraine, the authorities in Transnistria found themselves in a difficult situation. By April 2022, fighting was taking place in the Mykolaiv region, and columns of refugees were passing through the territory of the unrecognized republic into Moldova and on to Europe. The country was economically dependent on Russia and food-dependent on Moldova and Ukraine. Russian peacekeepers were stationed in Transnistria, the Moldovan State Power Plant supplied energy to southern Ukraine, and the artillery depot in Kolbasna, left over from the Soviet era, could become a tempting target for all sides in the conflict.\n\nThe PMR authorities do not have a military contingent capable of defending the republic from aggression by any of the parties involved.\n\nThe official position of the unrecognized republic remains as neutral as possible: the leadership, being dependent on all parties to the conflict, has decided not to side with any of them. Nevertheless, anxiety is growing among the population, and the republic's situation remains unstable."
 CHE_EAST_SHOWDOWN_2022_04_15_DESC: "February 24 shook the world and society, but not Chechnya. Putin's loyal foot soldier immediately showed his loyalty to Moscow by sending part of the republic's troops to the front, starting to recruit volunteers, and launching a propaganda campaign, seeing this as an opportunity to get rid of some of the passionate activists, test the newly formed units in battle, and get even more funding from the capital.\n\nAt the same time, pressure on the remaining Islamist underground and human rights organizations intensified; some activists were expelled from the republic or disappeared without a trace.\n\nOverall, the situation in Chechnya can be described as stable, but the power and authority of the authorities in Grozny are based on the power and authority of the central government, and any weakening of the latter could destabilize the situation in the region. "
 WGN_EAST_SHOWDOWN_2022_04_15_DESC: "The country's top leadership, having ascertained that victory was impossible with the forces at its disposal, but unwilling to take radical measures, decided to bring in the Wagner PMC to the SVO with all its might. Wagner mercenaries have been participating in the SVO since its inception, but in extremely limited numbers, no more than a thousand people. The time has come to deploy new units and formations; The Russian Armed Forces' warehouses are completely open to us, and we are ready to put the training of soldiers on stream. The propaganda campaign to recruit soldiers is intensifying, and a new player is appearing on the information front of the special military operation: a troll factory.\n\nThe first Wagner units have already been deployed to the front, launching an assault on Popasnaya. At the same time, Yevgeny Prigozhin is receiving reports from his subordinates about the level of training of Russian Armed Forces personnel and officers, the state of equipment, and losses, which has led the company's leader to treat the Russian Ministry of Defense with increasing contempt, unable to understand how such an ineffective structure with negative selection could have been created.\n\nThe bright, charismatic, and sharp-tongued head of the PMC is ready to become a shining star in the sky of the SVO, eclipsing bureaucrats and military personnel with the charisma of a stool, which undoubtedly threatens conflict between the Russian Ministry of Defense and the PMC.\n\nThe company responded to the call from the motherland."